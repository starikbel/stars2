<!DOCTYPE html>
<html lang="ru" data-theme="neon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎲 IT Челлендж</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@700&display=swap');

        :root {
            --accent: #60a5fa;
            --button: #1e40af;
            --bg1: #0f172a;
            --bg2: #1e2937;
            --text: #f1f5f9;
            --star-speed: 30s;
        }

        [data-theme="neon"] {
            --accent:     #00ffea;
            --button:     #ff00aa;
            --bg1:        #0f0c29;
            --bg2:        #302b63;
            --text:       #f0f9ff;
            --star-speed: 25s;
        }

        [data-theme="forest"] {
            --accent:     #a3e635;
            --button:     #4d7c0f;
            --bg1:        #052e16;
            --bg2:        #14532d;
            --text:       #f0fdf4;
            --star-speed: 40s;
        }

        [data-theme="dusk"] {
            --accent:     #f472b6;
            --button:     #6d28d9;
            --bg1:        #1e1238;
            --bg2:        #312e81;
            --text:       #f3e8ff;
            --star-speed: 35s;
        }

        [data-theme="ocean"] {
            --accent:     #06b6d4;
            --button:     #0c4a6e;
            --bg1:        #0e2b3d;
            --bg2:        #0f5e7a;
            --text:       #e0f7ff;
            --star-speed: 22s;
        }

        html, body {
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.09) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: stars var(--star-speed) linear infinite;
            pointer-events: none;
        }

        @keyframes stars {
            0%   { background-position: 0 0; }
            100% { background-position: 400px 400px; }
        }

        /* Пузырьки только для ocean */
        [data-theme="ocean"]::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        [data-theme="ocean"] .bubble {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255,255,255,0.5);
            animation: bubbleFloat 15s infinite ease-in-out;
        }

        [data-theme="ocean"] .bubble:nth-child(1) { width: 24px; height: 24px; left: 8%; animation-duration: 20s; animation-delay: 0s; }
        [data-theme="ocean"] .bubble:nth-child(2) { width: 38px; height: 38px; left: 22%; animation-duration: 24s; animation-delay: -4s; }
        [data-theme="ocean"] .bubble:nth-child(3) { width: 16px; height: 16px; left: 38%; animation-duration: 18s; animation-delay: -8s; }
        [data-theme="ocean"] .bubble:nth-child(4) { width: 32px; height: 32px; left: 55%; animation-duration: 22s; animation-delay: -12s; }
        [data-theme="ocean"] .bubble:nth-child(5) { width: 45px; height: 45px; left: 72%; animation-duration: 26s; animation-delay: -16s; }
        [data-theme="ocean"] .bubble:nth-child(6) { width: 20px; height: 20px; left: 88%; animation-duration: 19s; animation-delay: -2s; }

        @keyframes bubbleFloat {
            0%   { bottom: -10%; transform: translateX(0) rotate(0deg); opacity: 0.1; }
            50%  { transform: translateX(20px) rotate(10deg); opacity: 0.8; }
            100% { bottom: 110%; transform: translateX(-15px) rotate(-10deg); opacity: 0; }
        }

        /* Падающие листья для Forest */
        .leaves {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .leaf {
            position: absolute;
            font-size: 28px;
            opacity: 0.82;
            user-select: none;
            animation: leafFall linear infinite;
            filter: drop-shadow(0 0 10px rgba(163, 230, 53, 0.6));
            z-index: 2;
        }

        @keyframes leafFall {
            0% { transform: translateY(-80px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(920deg); }
        }

        /* Пролетающие огоньки для Dusk */
        .fireflies {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .firefly {
            position: absolute;
            width: 7px;
            height: 7px;
            background: #fef08c;
            border-radius: 50%;
            box-shadow: 0 0 8px #fef08c, 0 0 18px #facc15, 0 0 32px #eab308;
            animation: fireflyMove linear infinite;
            opacity: 0.75;
        }

        @keyframes fireflyMove {
            0%   { transform: translate(0, 0); opacity: 0.4; }
            50%  { opacity: 0.95; }
            100% { transform: translate(var(--dx), var(--dy)); opacity: 0.35; }
        }

        #logo { position: absolute; top: 20px; right: 20px; max-height: var(--logo-size,140px); max-width: 180px; object-fit: contain; filter: drop-shadow(0 0 25px var(--accent)); z-index: 20; pointer-events: none; }

        .top-bar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 70; display: flex; gap: 12px; }
        select {
            background: rgba(255,255,255,0.15);
            border: 2px solid var(--accent);
            color: #111 !important;
            padding: 9px 16px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }

        .container { text-align: center; z-index: 10; max-width: 920px; padding: 85px 25px 30px; width: 100%; }
        h1 { font-family: 'Press Start 2P', cursive; font-size: 2.8rem; margin: 15px 0 25px; text-shadow: 0 0 20px var(--accent); color: var(--accent); }

        #result { display: none; font-size: 1.35rem; color: var(--button); text-shadow: 0 0 15px var(--button); margin-bottom: 18px; font-weight: bold; }
        .display {
            background: rgba(255,255,255,0.1);
            border: 6px solid var(--accent);
            border-radius: 20px;
            padding: 45px 30px;
            min-height: 240px;
            font-size: 2.15rem;
            line-height: 1.35;
            margin: 0 auto 25px;
            max-width: 820px;
            box-shadow: 0 0 60px rgba(0,255,234,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all .4s;
        }
        .display.glow { animation: finalGlow 1.2s infinite alternate; border-color: var(--button); }
        @keyframes finalGlow { from { box-shadow: 0 0 60px rgba(0,255,234,0.7); } to { box-shadow: 0 0 130px var(--button), 0 0 180px var(--accent); } }

        button, .copy-btn { font-family: 'Press Start 2P', cursive; cursor: pointer; transition: all .3s; touch-action: manipulation; z-index: 50; }
        button { font-size: 1.65rem; padding: 22px 65px; background: var(--button); color: white; border: none; border-radius: 15px; box-shadow: 0 0 35px var(--button); margin-bottom: 20px; }
        .copy-btn { padding: 14px 35px; font-size: 1.2rem; background: var(--accent); color: #000; }

        #soundBtn { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.15); border: 2px solid var(--accent); color: var(--accent); padding: 8px 16px; font-size: 1rem; border-radius: 8px; cursor: pointer; z-index: 60; }

        #qrContainer { position: absolute; bottom: 25px; left: 25px; z-index: 25; background: #fff; padding: 12px; border-radius: 14px; box-shadow: 0 0 30px rgba(0,255,234,0.5); text-align: center; max-width: 178px; }
        #qrContainer p { max-width: 168px; font-size: 0.82rem; margin: 8px 0 0 0; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ============================================= */
        /* СКРЫТАЯ ИГРА */
        /* ============================================= */
        #gameTrigger {
            position: absolute;
            bottom: 28px;
            right: 28px;
            font-size: 26px;
            opacity: 0.22;
            cursor: pointer;
            z-index: 85;
            transition: all .3s ease;
            user-select: none;
            filter: drop-shadow(0 0 8px var(--accent));
            display: none;
        }
        #gameTrigger:hover {
            opacity: 1;
            transform: scale(1.35) rotate(12deg);
        }

        .game-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }
        .modal-content {
            background: var(--bg2);
            border: 7px solid var(--accent);
            border-radius: 22px;
            padding: 25px 30px;
            max-width: 390px;
            width: 92%;
            text-align: center;
            box-shadow: 0 0 70px var(--accent);
            position: relative;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .modal-header h2 {
            margin: 0;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.45rem;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
        }
        .modal-header button {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text);
            cursor: pointer;
            padding: 0 8px;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            font-size: 1.15rem;
            margin: 15px 0 20px;
            color: var(--text);
        }
        .game-info div { font-family: 'Press Start 2P', cursive; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin: 0 auto;
            width: 285px;
        }
        .hole {
            background: rgba(0,0,0,0.35);
            border: 5px solid #222;
            border-radius: 50%;
            height: 92px;
            position: relative;
            cursor: pointer;
            box-shadow: inset 0 8px 15px rgba(0,0,0,0.6);
        }
        .bug {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 58px;
            transform: translate(-50%, -50%) scale(0.3);
            transition: transform .12s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            animation: bugPop 0.25s forwards;
        }
        @keyframes bugPop {
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .explosion, .error-mark {
            position: absolute;
            top: 50%;
            left: 50%;
            pointer-events: none;
            z-index: 10;
        }
        .explosion { font-size: 68px; animation: explodeAnim 650ms forwards; }
        @keyframes explodeAnim {
            0%   { transform: translate(-50%, -50%) scale(0.1); opacity: 1; }
            40%  { transform: translate(-50%, -50%) scale(1.35); }
            100% { transform: translate(-50%, -50%) scale(1.85); opacity: 0; }
        }
        .error-mark { font-size: 52px; color: #f43f5e; animation: errorAnim 700ms forwards; }
        @keyframes errorAnim {
            0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.65); opacity: 0; }
        }

        /* Змейка */
        #snakeContainer {
            display: none;
        }
        #snakeCanvas {
            background: #111;
            border: 6px solid var(--accent);
            border-radius: 12px;
            image-rendering: pixelated;
            width: 100%;
            max-width: 320px;
            height: auto;
        }
        #snakeScoreDisplay {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.3rem;
            margin: 15px 0;
            color: #a3e635;
        }

        /* МОБИЛЬНЫЕ КНОПКИ УПРАВЛЕНИЯ ЗМЕЙКОЙ — ИСПРАВЛЕНО */
        .snake-controls {
            display: grid;
            grid-template-columns: repeat(3, 48px);
            gap: 6px;
            margin: 18px auto 0;
            justify-content: center;
            touch-action: manipulation;
        }
        .snake-controls button {
            font-size: 2rem;
            padding: 10px;
            background: rgba(255,255,255,0.15);
            border: 3px solid var(--accent);
            color: var(--accent);
            border-radius: 12px;
            box-shadow: 0 0 15px var(--accent);
        }
        .snake-controls button:active {
            transform: scale(0.85);
            background: var(--accent);
            color: #000;
        }

        #startGameBtn, #startSnakeBtn {
            font-size: 1.35rem;
            padding: 14px 48px;
            margin: 18px auto 0;
            background: var(--button);
            color: white;
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 25px var(--button);
        }
        #gameResult {
            margin-top: 20px;
            font-size: 1.25rem;
            color: #f43f5e;
            text-shadow: 0 0 12px #f43f5e;
            line-height: 1.4;
        }

        /* ==================== ИСПРАВЛЕННАЯ МОБИЛЬНАЯ ВЕРСИЯ ==================== */
        @media (max-width:768px){
            #qrContainer { display: none !important; }
            #gameTrigger { bottom: 18px; right: 18px; font-size: 22px; }
            .modal-content { 
                padding: 14px 12px !important; 
                max-width: 98% !important; 
                max-height: 94vh !important;
                overflow-y: auto;
            }
            .game-grid { width: 100% !important; gap: 9px; }
            .hole { height: 74px; }
            .bug { font-size: 46px; }
            #snakeCanvas { max-width: 265px; }
            .snake-controls { 
                grid-template-columns: repeat(3, 46px); 
                gap: 5px; 
            }
            .snake-controls button { font-size: 1.85rem; padding: 9px; }
            .game-info { font-size: 1.05rem; }
            #modalTitle { font-size: 1.3rem; }
        }

        @media (orientation: landscape) and (max-height: 520px){
            .modal-content { 
                padding: 10px 12px !important; 
                max-height: 96vh !important;
            }
            .game-grid { width: 255px !important; }
            .hole { height: 66px; }
            #snakeCanvas { max-width: 255px; }
            .snake-controls { 
                grid-template-columns: repeat(3, 40px); 
                gap: 4px; 
                margin: 10px auto 0;
            }
            .snake-controls button { font-size: 1.7rem; padding: 7px; }
        }
    </style>
</head>
<body>
    <img id="logo" src="logo.png" alt="Логотип">

    <button id="soundBtn">🔊 Звук включён</button>

    <div class="top-bar">
        <select id="categorySelect"></select>
        <select id="themeSelect">
            <option value="neon" selected>🌟 Neon (оригинал)</option>
            <option value="forest">🌲 Forest</option>
            <option value="dusk">🌅 Dusk</option>
            <option value="ocean">🌊 Ocean</option>
        </select>
    </div>

    <div id="qrContainer">
        <div id="qrcode"></div>
        <p>Сканируй для открытия</p>
    </div>

    <!-- Пузырьки для ocean -->
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- Листья для Forest -->
    <div class="leaves" id="leavesContainer"></div>

    <!-- Огоньки для Dusk -->
    <div class="fireflies" id="firefliesContainer"></div>

    <!-- СКРЫТЫЙ ЗНАЧОК ИГРЫ -->
    <div id="gameTrigger" title="Скрытая игра">🐛</div>

    <!-- МОДАЛЬНОЕ ОКНО ИГРЫ -->
    <div id="gameModal" class="game-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">🐛 БЕЙ БАГИ!</h2>
                <button id="closeGameBtn">✕</button>
            </div>
            
            <!-- БЕЙ БАГИ -->
            <div id="whacContainer">
                <div class="game-info">
                    <div>Время: <span id="gameTimer">30</span></div>
                    <div>Счёт: <span id="gameScore">0</span></div>
                    <div>Рекорд: <span id="gameHighScore">0</span></div>
                </div>
                <div id="gameGrid" class="game-grid"></div>
                <button id="startGameBtn">▶️ НАЧАТЬ ИГРУ</button>
                <div id="gameResult" style="display:none;">
                    ИГРА ОКОНЧЕНА!<br>
                    Твой счёт: <span id="finalScore">0</span>
                </div>
            </div>

            <!-- ЗМЕЙКА -->
            <div id="snakeContainer">
                <div id="snakeScoreDisplay">Счёт: <span id="snakeScore">0</span></div>
                <canvas id="snakeCanvas" width="320" height="320"></canvas>
                
                <!-- МОБИЛЬНЫЕ КНОПКИ УПРАВЛЕНИЯ -->
                <div class="snake-controls" id="snakeControls">
                    <div></div>
                    <button id="btnUp">↑</button>
                    <div></div>
                    <button id="btnLeft">←</button>
                    <button id="btnDown">↓</button>
                    <button id="btnRight">→</button>
                </div>

                <button id="startSnakeBtn">▶️ НАЧАТЬ ЗМЕЙКУ</button>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>🎲 IT ЧЕЛЛЕНДЖ</h1>
        <div id="result">✅ ГОТОВО! Вот твоё задание:</div>
        <div id="display" class="display">Нажми «КРУТИТЬ!», чтобы получить задание!</div>
        <button id="spinBtn">🚀 КРУТИТЬ ЗАДАНИЕ!</button>
        <button id="copyBtn" class="copy-btn" style="display:none;">📋 Скопировать задание</button>
    </div>

    <script src="tasks.js"></script>
    <script>
        let currentCategory = "";
        let currentTask = "";
        let isSpinning = false;
        let soundEnabled = true;
        let audioContext;
        let spinCount = 0;
        let gameMode = "whac";

        const themeSounds = {
            neon:   {tick:[1100,1800], final:[523,659,784]},
            forest: {tick:[700,1100],  final:[392,523,659]},
            dusk:   {tick:[900,1400],  final:[440,554,698]},
            ocean:  {tick:[800,1300],  final:[523,659,880]}
        };

        function getAudioContext() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            return audioContext;
        }

        function playSpinTick() {
            if (!soundEnabled) return;
            const t = themeSounds[document.documentElement.dataset.theme || 'neon'];
            const ctx = getAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = t.tick[Math.floor(Math.random()*t.tick.length)];
            gain.gain.value = 0.11;
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start();
            setTimeout(()=>{gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.04);osc.stop(ctx.currentTime+0.06)},12);
        }

        function playFinalSound() {
            if (!soundEnabled) return;
            const t = themeSounds[document.documentElement.dataset.theme || 'neon'];
            const ctx = getAudioContext();
            t.final.forEach((freq,i)=>{
                setTimeout(()=>{
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type='sine'; osc.frequency.value=freq; gain.gain.value=0.24;
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start();
                    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.3);
                    osc.stop(ctx.currentTime+1.5);
                },i*75);
            });
        }

        function playGameSound(type) {
            if (!soundEnabled) return;
            const ctx = getAudioContext();
            if (type === 'good' || type === 'eat') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = type === 'eat' ? 1380 : 920;
                gain.gain.value = 0.28;
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start();
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.18);
                osc.stop(ctx.currentTime + 0.25);
            } else if (type === 'bad' || type === 'miss') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 180;
                gain.gain.value = 0.35;
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start();
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.25);
                osc.stop(ctx.currentTime + 0.35);
            } else if (type === 'over') {
                [620, 480, 340].forEach((f,i) => {
                    setTimeout(() => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = f;
                        gain.gain.value = 0.3;
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start();
                        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
                        osc.stop(ctx.currentTime + 0.7);
                    }, i * 90);
                });
            }
        }

        function createLeaves() {
            const container = document.getElementById('leavesContainer');
            container.innerHTML = '';
            const leafTypes = ['🍂', '🍃', '🌿', '🍁'];
            for (let i = 0; i < 14; i++) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.textContent = leafTypes[Math.floor(Math.random() * leafTypes.length)];
                const left = Math.random() * 100;
                const duration = 12 + Math.random() * 18;
                const delay = Math.random() * -25;
                const size = 22 + Math.random() * 18;
                leaf.style.left = `${left}vw`;
                leaf.style.fontSize = `${size}px`;
                leaf.style.animationDuration = `${duration}s`;
                leaf.style.animationDelay = `${delay}s`;
                leaf.style.opacity = 0.65 + Math.random() * 0.3;
                container.appendChild(leaf);
            }
        }

        function createFireflies() {
            const container = document.getElementById('firefliesContainer');
            container.innerHTML = '';
            for (let i = 0; i < 18; i++) {
                const fly = document.createElement('div');
                fly.className = 'firefly';
                const left = Math.random() * 100;
                const top = Math.random() * 70;
                const duration = 15 + Math.random() * 25;
                const delay = Math.random() * -30;
                const size = 4 + Math.random() * 5;
                const dx = (Math.random() - 0.5) * 380;
                const dy = 120 + Math.random() * 280;
                fly.style.left = `${left}vw`;
                fly.style.top = `${top}vh`;
                fly.style.width = `${size}px`;
                fly.style.height = `${size}px`;
                fly.style.animationDuration = `${duration}s`;
                fly.style.animationDelay = `${delay}s`;
                fly.style.setProperty('--dx', `${dx}px`);
                fly.style.setProperty('--dy', `${dy}px`);
                container.appendChild(fly);
            }
        }

        let gameScore = 0;
        let gameTimerInterval = null;
        let bugPopInterval = null;
        let gameActive = false;
        let highScore = localStorage.getItem('bugBusterHighScore') || 0;

        const bugTypes = [
            {emoji: '🪲', points: 10},
            {emoji: '🐜', points: -20},
            {emoji: '🐛', points: -30}
        ];

        function createGameGrid() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.addEventListener('click', () => {
                    if (!gameActive) return;
                    const bug = hole.querySelector('.bug');
                    if (bug) {
                        const pts = parseInt(bug.dataset.points);
                        const explosion = document.createElement('div');
                        explosion.className = 'explosion';
                        explosion.textContent = '💥';
                        hole.appendChild(explosion);
                        setTimeout(() => explosion.remove(), 700);
                        bug.style.transform = 'translate(-50%, -50%) scale(0.1)';
                        setTimeout(() => bug.remove(), 180);
                        gameScore = Math.max(0, gameScore + pts);
                        document.getElementById('gameScore').textContent = gameScore;
                        playGameSound(pts > 0 ? 'good' : 'bad');
                    } else {
                        const error = document.createElement('div');
                        error.className = 'error-mark';
                        error.textContent = '❌';
                        hole.appendChild(error);
                        setTimeout(() => error.remove(), 700);
                        gameScore = Math.max(0, gameScore - 5);
                        document.getElementById('gameScore').textContent = gameScore;
                        playGameSound('miss');
                    }
                });
                grid.appendChild(hole);
            }
        }

        function popBug() {
            if (!gameActive) return;
            const holes = document.querySelectorAll('.hole');
            const randomIndex = Math.floor(Math.random() * 9);
            const hole = holes[randomIndex];
            if (hole.querySelector('.bug')) return;

            const type = bugTypes[Math.floor(Math.random() * bugTypes.length)];
            const bug = document.createElement('div');
            bug.className = 'bug';
            bug.textContent = type.emoji;
            bug.dataset.points = type.points;
            hole.appendChild(bug);

            setTimeout(() => {
                if (bug.parentNode) {
                    bug.style.transform = 'translate(-50%, -50%) scale(0.1)';
                    setTimeout(() => bug.remove(), 180);
                }
            }, 900);
        }

        function startBugGame() {
            gameScore = 0;
            document.getElementById('gameScore').textContent = '0';
            document.getElementById('startGameBtn').style.display = 'none';
            document.getElementById('gameResult').style.display = 'none';
            gameActive = true;
            let timeLeft = 30;
            document.getElementById('gameTimer').textContent = timeLeft;

            if (gameTimerInterval) clearInterval(gameTimerInterval);
            if (bugPopInterval) clearInterval(bugPopInterval);

            gameTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('gameTimer').textContent = timeLeft;
                if (timeLeft <= 0) endBugGame();
            }, 1000);

            bugPopInterval = setInterval(popBug, 420);
        }

        function endBugGame() {
            gameActive = false;
            if (gameTimerInterval) clearInterval(gameTimerInterval);
            if (bugPopInterval) clearInterval(bugPopInterval);
            document.getElementById('startGameBtn').style.display = 'block';
            const resultEl = document.getElementById('gameResult');
            resultEl.style.display = 'block';
            document.getElementById('finalScore').textContent = gameScore;
            if (gameScore > highScore) {
                highScore = gameScore;
                localStorage.setItem('bugBusterHighScore', highScore);
                document.getElementById('gameHighScore').textContent = highScore;
            }
        }

        let snake = [];
        let dx = 1, dy = 0;
        let foodX, foodY;
        let snakeScore = 0;
        let snakeInterval = null;
        const tileCount = 20;
        let snakeCanvas, ctx;

        function initSnake() {
            snake = [{x: 10, y: 10}];
            dx = 1; dy = 0;
            snakeScore = 0;
            document.getElementById('snakeScore').textContent = snakeScore;
            placeFood();
            drawSnake();
        }

        function placeFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);
            for (let seg of snake) {
                if (seg.x === foodX && seg.y === foodY) {
                    placeFood();
                    return;
                }
            }
        }

        function drawSnake() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, snakeCanvas.width, snakeCanvas.height);
            ctx.fillStyle = '#a3e635';
            for (let seg of snake) {
                ctx.fillRect(seg.x * 16, seg.y * 16, 16, 16);
            }
            ctx.fillStyle = '#f43f5e';
            ctx.fillRect(foodX * 16, foodY * 16, 16, 16);
        }

        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x === head.x && s.y === head.y)) {
                endSnakeGame();
                return;
            }
            snake.unshift(head);
            if (head.x === foodX && head.y === foodY) {
                snakeScore += 10;
                document.getElementById('snakeScore').textContent = snakeScore;
                placeFood();
                playGameSound('eat');
            } else {
                snake.pop();
            }
            drawSnake();
        }

        function endSnakeGame() {
            gameActive = false;
            clearInterval(snakeInterval);
            playGameSound('over');
            alert(`🐍 ИГРА ОКОНЧЕНА!\nТвой счёт: ${snakeScore}`);
            document.getElementById('startSnakeBtn').style.display = 'block';
        }

        function startSnakeGame() {
            gameActive = true;
            document.getElementById('startSnakeBtn').style.display = 'none';
            initSnake();
            snakeInterval = setInterval(moveSnake, 140);
        }

        function changeDirection(newDx, newDy) {
            if (!gameActive || gameMode !== "snake") return;
            if (newDx === -dx && newDy === 0) return;
            if (newDx === 0 && newDy === -dy) return;
            dx = newDx;
            dy = newDy;
        }

        function initMobileControls() {
            const controls = document.getElementById('snakeControls');
            controls.style.display = 'grid';

            const up = document.getElementById('btnUp');
            const down = document.getElementById('btnDown');
            const left = document.getElementById('btnLeft');
            const right = document.getElementById('btnRight');

            // touch + click для максимальной совместимости
            up.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, -1); });
            up.addEventListener('click', () => changeDirection(0, -1));
            down.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, 1); });
            down.addEventListener('click', () => changeDirection(0, 1));
            left.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(-1, 0); });
            left.addEventListener('click', () => changeDirection(-1, 0));
            right.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(1, 0); });
            right.addEventListener('click', () => changeDirection(1, 0));
        }

        function addSwipeControls() {
            let touchStartX = 0, touchStartY = 0;
            snakeCanvas.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, {passive: true});
            snakeCanvas.addEventListener('touchend', e => {
                if (!gameActive) return;
                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                const deltaX = touchEndX - touchStartX;
                const deltaY = touchEndY - touchStartY;
                if (Math.abs(deltaX) > Math.abs(deltaY) + 10) {
                    if (deltaX > 40) changeDirection(1, 0);
                    else if (deltaX < -40) changeDirection(-1, 0);
                } else if (Math.abs(deltaY) > Math.abs(deltaX) + 10) {
                    if (deltaY > 40) changeDirection(0, 1);
                    else if (deltaY < -40) changeDirection(0, -1);
                }
            }, {passive: true});
        }

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('result').style.display = 'none';
            document.getElementById('copyBtn').style.display = 'none';
            const display = document.getElementById('display');
            display.classList.remove('glow');

            let delay = 18, step = 0, total = 68;
            const tasks = window.categories?.[currentCategory] || [];

            if (tasks.length === 0) {
                display.textContent = "Нет заданий в категории 😔";
                isSpinning = false;
                document.getElementById('result').style.display = 'block';
                return;
            }

            function spinLoop() {
                currentTask = tasks[Math.floor(Math.random() * tasks.length)];
                display.textContent = currentTask;
                playSpinTick();
                step++;
                if (step > 45) delay = 45 + (step-45)*11;
                if (step > 58) delay = 120 + (step-58)*28;

                if (step < total) setTimeout(spinLoop, delay);
                else {
                    isSpinning = false;
                    display.classList.add('glow');
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('copyBtn').style.display = 'inline-block';
                    playFinalSound();

                    spinCount++;
                    const trigger = document.getElementById('gameTrigger');
                    if (spinCount >= 5) trigger.style.display = 'block';
                    if (spinCount >= 10) {
                        gameMode = "snake";
                        trigger.textContent = '🐍';
                        trigger.title = 'Змейка';
                    }
                }
            }
            spinLoop();
        }

        function copyTask() {
            if (!currentTask) return;
            navigator.clipboard.writeText(currentTask).then(() => {
                const btn = document.getElementById('copyBtn');
                const old = btn.textContent;
                btn.textContent = "✅ СКОПИРОВАНО!";
                setTimeout(() => btn.textContent = old, 1800);
            });
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 Звук включён' : '🔇 Звук выключен';
        }

        window.addEventListener('load', () => {
            const catSelect = document.getElementById('categorySelect');
            const themeSelect = document.getElementById('themeSelect');
            const bubbles = document.querySelector('.bubbles');
            const leavesContainer = document.getElementById('leavesContainer');
            const firefliesContainer = document.getElementById('firefliesContainer');
            const cats = window.categories || {};

            Object.keys(cats).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                catSelect.appendChild(opt);
            });

            if (Object.keys(cats).length > 0) {
                const first = Object.keys(cats)[0];
                catSelect.value = first;
                currentCategory = first;
            }

            catSelect.addEventListener('change', () => currentCategory = catSelect.value);

            createLeaves();
            createFireflies();

            themeSelect.addEventListener('change', () => {
                const theme = themeSelect.value;
                document.documentElement.dataset.theme = theme;
                bubbles.style.display = (theme === 'ocean') ? 'block' : 'none';
                leavesContainer.style.display = (theme === 'forest') ? 'block' : 'none';
                firefliesContainer.style.display = (theme === 'dusk') ? 'block' : 'none';
            });

            const initialTheme = themeSelect.value;
            bubbles.style.display = (initialTheme === 'ocean') ? 'block' : 'none';
            leavesContainer.style.display = (initialTheme === 'forest') ? 'block' : 'none';
            firefliesContainer.style.display = (initialTheme === 'dusk') ? 'block' : 'none';

            document.getElementById('spinBtn').addEventListener('click', startSpin);
            document.getElementById('copyBtn').addEventListener('click', copyTask);
            document.getElementById('soundBtn').addEventListener('click', toggleSound);

            document.getElementById('gameHighScore').textContent = highScore;

            document.getElementById('gameTrigger').addEventListener('click', () => {
                const modal = document.getElementById('gameModal');
                modal.style.display = 'flex';

                if (gameMode === "snake") {
                    document.getElementById('whacContainer').style.display = 'none';
                    document.getElementById('snakeContainer').style.display = 'block';
                    document.getElementById('modalTitle').textContent = '🐍 ЗМЕЙКА!';
                    snakeCanvas = document.getElementById('snakeCanvas');
                    ctx = snakeCanvas.getContext('2d');

                    // Адаптация размера холста под мобильные
                    if (window.innerWidth <= 768) {
                        snakeCanvas.width = 260;
                        snakeCanvas.height = 260;
                    }

                    document.getElementById('startSnakeBtn').style.display = 'block';
                    initMobileControls();
                    addSwipeControls();
                } else {
                    document.getElementById('snakeContainer').style.display = 'none';
                    document.getElementById('whacContainer').style.display = 'block';
                    document.getElementById('modalTitle').textContent = '🐛 БЕЙ БАГИ!';
                    createGameGrid();
                    document.getElementById('startGameBtn').style.display = 'block';
                    document.getElementById('gameResult').style.display = 'none';
                    document.getElementById('gameScore').textContent = '0';
                }
            });

            document.getElementById('closeGameBtn').addEventListener('click', () => {
                const modal = document.getElementById('gameModal');
                modal.style.display = 'none';
                if (gameActive) {
                    if (gameMode === "snake") endSnakeGame();
                    else endBugGame();
                }
            });

            document.getElementById('startGameBtn').addEventListener('click', startBugGame);
            document.getElementById('startSnakeBtn').addEventListener('click', startSnakeGame);

            document.addEventListener('keydown', e => {
                if (gameMode !== "snake" || !gameActive) return;
                switch (e.key) {
                    case "ArrowUp":    changeDirection(0, -1); break;
                    case "ArrowDown":  changeDirection(0, 1); break;
                    case "ArrowLeft":  changeDirection(-1, 0); break;
                    case "ArrowRight": changeDirection(1, 0); break;
                }
            });

            if (window.innerWidth > 768) {
                new QRCode(document.getElementById("qrcode"), {
                    text: window.location.href,
                    width: 168, height: 168,
                    colorDark: "#000000", colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }

            document.body.addEventListener('click', () => {
                getAudioContext().resume();
            }, { once: true });
        });
    </script>
</body>
</html>
