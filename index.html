<!DOCTYPE html>
<html lang="ru" data-theme="neon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎲 IT Челлендж</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@700&display=swap');

        :root {
            --accent: #60a5fa;
            --button: #1e40af;
            --bg1: #0f172a;
            --bg2: #1e2937;
            --text: #f1f5f9;
            --star-speed: 30s;
        }

        [data-theme="neon"] {
            --accent:     #00ffea;
            --button:     #ff00aa;
            --bg1:        #0f0c29;
            --bg2:        #302b63;
            --text:       #f0f9ff;
            --star-speed: 25s;
        }

        [data-theme="forest"] {
            --accent:     #a3e635;
            --button:     #4d7c0f;
            --bg1:        #052e16;
            --bg2:        #14532d;
            --text:       #f0fdf4;
            --star-speed: 40s;
        }

        [data-theme="dusk"] {
            --accent:     #f472b6;
            --button:     #6d28d9;
            --bg1:        #1e1238;
            --bg2:        #312e81;
            --text:       #f3e8ff;
            --star-speed: 35s;
        }

        [data-theme="ocean"] {
            --accent:     #06b6d4;
            --button:     #0c4a6e;
            --bg1:        #0e2b3d;
            --bg2:        #0f5e7a;
            --text:       #e0f7ff;
            --star-speed: 22s;
        }

        html, body {
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.6s ease; /* плавная смена темы */
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.09) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: stars var(--star-speed) linear infinite;
            pointer-events: none;
        }

        @keyframes stars {
            0%   { background-position: 0 0; }
            100% { background-position: 400px 400px; }
        }

        /* Пузырьки только для ocean */
        [data-theme="ocean"]::after {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        [data-theme="ocean"] .bubble {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            box-shadow: 0 0 12px rgba(255,255,255,0.5);
            animation: bubbleFloat 15s infinite ease-in-out;
        }

        [data-theme="ocean"] .bubble:nth-child(1) { width: 24px; height: 24px; left: 8%; animation-duration: 20s; animation-delay: 0s; }
        [data-theme="ocean"] .bubble:nth-child(2) { width: 38px; height: 38px; left: 22%; animation-duration: 24s; animation-delay: -4s; }
        [data-theme="ocean"] .bubble:nth-child(3) { width: 16px; height: 16px; left: 38%; animation-duration: 18s; animation-delay: -8s; }
        [data-theme="ocean"] .bubble:nth-child(4) { width: 32px; height: 32px; left: 55%; animation-duration: 22s; animation-delay: -12s; }
        [data-theme="ocean"] .bubble:nth-child(5) { width: 45px; height: 45px; left: 72%; animation-duration: 26s; animation-delay: -16s; }
        [data-theme="ocean"] .bubble:nth-child(6) { width: 20px; height: 20px; left: 88%; animation-duration: 19s; animation-delay: -2s; }

        @keyframes bubbleFloat {
            0%   { bottom: -10%; transform: translateX(0) rotate(0deg); opacity: 0.1; }
            50%  { transform: translateX(20px) rotate(10deg); opacity: 0.8; }
            100% { bottom: 110%; transform: translateX(-15px) rotate(-10deg); opacity: 0; }
        }

        /* Падающие листья для Forest */
        .leaves {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .leaf {
            position: absolute;
            font-size: 28px;
            opacity: 0.82;
            user-select: none;
            animation: leafFall linear infinite;
            filter: drop-shadow(0 0 10px rgba(163, 230, 53, 0.6));
            z-index: 2;
        }

        @keyframes leafFall {
            0% { transform: translateY(-80px) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(920deg); }
        }

        /* Пролетающие огоньки для Dusk */
        .fireflies {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .firefly {
            position: absolute;
            width: 7px;
            height: 7px;
            background: #fef08c;
            border-radius: 50%;
            box-shadow: 0 0 8px #fef08c, 0 0 18px #facc15, 0 0 32px #eab308;
            animation: fireflyMove linear infinite;
            opacity: 0.75;
        }

        @keyframes fireflyMove {
            0%   { transform: translate(0, 0); opacity: 0.4; }
            50%  { opacity: 0.95; }
            100% { transform: translate(var(--dx), var(--dy)); opacity: 0.35; }
        }

        #logo { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            max-height: var(--logo-size,140px); 
            max-width: 180px; 
            object-fit: contain; 
            filter: drop-shadow(0 0 25px var(--accent)); 
            z-index: 20; 
            pointer-events: none;
            transition: filter 0.3s ease;
        }

        .top-bar { 
            position: absolute; 
            top: 15px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 70; 
            display: flex; 
            gap: 12px; 
            background: rgba(0,0,0,0.35);
            padding: 8px 14px;
            border-radius: 14px;
            backdrop-filter: blur(6px);
            transition: background 0.3s ease, top 0.3s ease;
        }
        select {
            background: rgba(255,255,255,0.15);
            border: 2px solid var(--accent);
            color: #111 !important;
            padding: 9px 16px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        select:hover {
            border-color: var(--button);
            transform: scale(1.02);
        }

        .container { 
            text-align: center; 
            z-index: 10; 
            max-width: 920px; 
            padding: 85px 25px 30px; 
            width: 100%; 
        }
        h1 { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 2.8rem; 
            margin: 15px 0 25px; 
            text-shadow: 0 0 20px var(--accent); 
            color: var(--accent); 
            word-break: break-word;
        }

        #result { 
            display: none; 
            font-size: 1.35rem; 
            color: var(--button); 
            text-shadow: 0 0 15px var(--button); 
            margin-bottom: 18px; 
            font-weight: bold; 
        }
        .display {
            background: rgba(0,0,0,0.3); /* более плотный фон */
            border: 6px solid var(--accent);
            border-radius: 20px;
            padding: 45px 30px;
            min-height: 240px;
            font-size: 2.15rem;
            line-height: 1.35;
            margin: 0 auto 25px;
            max-width: 820px;
            box-shadow: 0 0 60px rgba(0,255,234,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all .4s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* улучшение читаемости */
        }
        .display.glow { 
            animation: finalGlow 1.2s infinite alternate; 
            border-color: var(--button); 
        }
        @keyframes finalGlow { 
            from { box-shadow: 0 0 60px rgba(0,255,234,0.7); } 
            to { box-shadow: 0 0 130px var(--button), 0 0 180px var(--accent); } 
        }

        button, .copy-btn { 
            font-family: 'Press Start 2P', cursive; 
            cursor: pointer; 
            transition: all .3s ease; 
            touch-action: manipulation; 
            z-index: 50; 
        }
        button { 
            font-size: 1.65rem; 
            padding: 22px 65px; 
            background: var(--button); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 0 35px var(--button); 
            margin-bottom: 20px; 
        }
        button:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
        .copy-btn { 
            padding: 14px 35px; 
            font-size: 1.2rem; 
            background: var(--accent); 
            color: #000; 
        }
        .copy-btn:hover {
            transform: scale(1.02);
            background: var(--button);
            color: white;
        }

        #soundBtn { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(255,255,255,0.15); 
            border: 2px solid var(--accent); 
            color: var(--accent); 
            padding: 8px 16px; 
            font-size: 1rem; 
            border-radius: 8px; 
            cursor: pointer; 
            z-index: 60; 
            transition: all 0.3s ease;
        }
        #soundBtn:hover {
            background: var(--accent);
            color: #000;
        }

        #qrContainer { 
            position: absolute; 
            bottom: 25px; 
            left: 25px; 
            z-index: 25; 
            background: #fff; 
            padding: 12px; 
            border-radius: 14px; 
            box-shadow: 0 0 30px rgba(0,255,234,0.5); 
            text-align: center; 
            max-width: 178px; 
        }
        #qrContainer p { 
            max-width: 168px; 
            font-size: 0.82rem; 
            margin: 8px 0 0 0; 
            color: #111; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* СКРЫТАЯ ИГРА */
        #gameTrigger {
            position: absolute;
            bottom: 28px;
            right: 28px;
            font-size: 26px;
            opacity: 0.22;
            cursor: pointer;
            z-index: 85;
            transition: all .3s ease;
            user-select: none;
            filter: drop-shadow(0 0 8px var(--accent));
            display: none;
        }
        #gameTrigger:hover {
            opacity: 1;
            transform: scale(1.35) rotate(12deg);
        }
        #gameTrigger.pulse {
            animation: triggerPulse 1.5s infinite;
        }
        @keyframes triggerPulse {
            0% { opacity: 0.22; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 15px var(--accent)); }
            100% { opacity: 0.22; transform: scale(1); }
        }

        .game-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content {
            background: var(--bg2);
            border: 7px solid var(--accent);
            border-radius: 22px;
            padding: 25px 30px;
            max-width: 390px;
            width: 92%;
            text-align: center;
            box-shadow: 0 0 70px var(--accent);
            position: relative;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .modal-header h2 {
            margin: 0;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.45rem;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent);
        }
        .modal-header button {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text);
            cursor: pointer;
            padding: 0 8px;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            font-size: 1.15rem;
            margin: 15px 0 20px;
            color: var(--text);
        }
        .game-info div { font-family: 'Press Start 2P', cursive; }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin: 0 auto;
            width: 285px;
        }
        .hole {
            background: rgba(0,0,0,0.35);
            border: 5px solid #222;
            border-radius: 50%;
            height: 92px;
            position: relative;
            cursor: pointer;
            box-shadow: inset 0 8px 15px rgba(0,0,0,0.6);
        }
        .bug {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 58px;
            transform: translate(-50%, -50%) scale(0.3);
            transition: transform .12s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            animation: bugPop 0.25s forwards;
            pointer-events: none; /* чтобы не ловить клик на самом баге */
        }
        .bug.negative {
            filter: drop-shadow(0 0 8px red);
        }
        .bug.negative::after {
            content: " -";
            color: red;
            font-weight: bold;
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 24px;
            text-shadow: 0 0 5px red;
        }
        @keyframes bugPop {
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .explosion, .error-mark {
            position: absolute;
            top: 50%;
            left: 50%;
            pointer-events: none;
            z-index: 10;
        }
        .explosion { font-size: 68px; animation: explodeAnim 650ms forwards; }
        @keyframes explodeAnim {
            0%   { transform: translate(-50%, -50%) scale(0.1); opacity: 1; }
            40%  { transform: translate(-50%, -50%) scale(1.35); }
            100% { transform: translate(-50%, -50%) scale(1.85); opacity: 0; }
        }
        .error-mark { font-size: 52px; color: #f43f5e; animation: errorAnim 700ms forwards; }
        @keyframes errorAnim {
            0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.65); opacity: 0; }
        }

        /* Змейка */
        #snakeContainer {
            display: none;
        }
        #snakeCanvas {
            background: #111;
            border: 6px solid var(--accent);
            border-radius: 12px;
            image-rendering: pixelated;
            width: 100%;
            max-width: 320px;
            height: auto;
            display: block;
            margin: 0 auto;
            transition: border-color 0.3s ease;
        }
        #snakeScoreDisplay {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.3rem;
            margin: 15px 0;
            color: #a3e635;
        }

        .snake-controls {
            display: grid;
            grid-template-columns: repeat(3, 48px);
            gap: 6px;
            margin: 18px auto 0;
            justify-content: center;
            touch-action: manipulation;
        }
        .snake-controls button {
            font-size: 2rem;
            padding: 10px;
            background: rgba(255,255,255,0.15);
            border: 3px solid var(--accent);
            color: var(--accent);
            border-radius: 12px;
            box-shadow: 0 0 15px var(--accent);
            transition: all 0.2s ease;
        }
        .snake-controls button:active {
            transform: scale(0.85);
            background: var(--accent);
            color: #000;
        }

        #startGameBtn, #startSnakeBtn {
            font-size: 1.35rem;
            padding: 14px 48px;
            margin: 18px auto 0;
            background: var(--button);
            color: white;
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 25px var(--button);
        }
        #gameResult {
            margin-top: 20px;
            font-size: 1.25rem;
            color: #f43f5e;
            text-shadow: 0 0 12px #f43f5e;
            line-height: 1.4;
        }
        #snakeResult {
            margin-top: 20px;
            font-size: 1.25rem;
            color: #f43f5e;
            text-shadow: 0 0 12px #f43f5e;
            line-height: 1.4;
            display: none;
        }
        .record-message {
            color: gold;
            text-shadow: 0 0 15px gold;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
        @media (max-width:768px){
            #qrContainer { display: none !important; }
            
            html, body {
                height: auto !important;
                min-height: 100vh;
                overflow-y: auto !important;
                overflow-x: hidden;
                -webkit-overflow-scrolling: touch;
            }
            body { padding-bottom: 80px !important; }
            
            .container { padding: 110px 20px 40px !important; }
            h1 { font-size: 2.25rem !important; margin: 12px 0 18px !important; }
            .display { font-size: 1.78rem !important; min-height: 164px !important; padding: 26px 18px !important; }
            button { font-size: 1.45rem !important; padding: 17px 48px !important; }
            
            /* Топ-бар – теперь выше, ближе к шапке */
            .top-bar { 
                top: 16px !important; 
                left: auto !important;
                right: 16px !important;
                transform: none !important;
                gap: 8px;
                padding: 7px 12px !important;
                background: rgba(0,0,0,0.45) !important;
                max-width: calc(100% - 120px); /* чтобы не налезать на кнопку звука */
            }
            select { 
                padding: 8px 12px !important; 
                font-size: 0.95rem !important; 
            }
            
            #logo { 
                top: 12px !important; 
                right: 12px !important; 
                max-height: 70px !important; 
            }
            #soundBtn { 
                top: 12px !important; 
                left: 12px !important; 
                padding: 6px 12px;
                font-size: 0.9rem;
            }
            
            .modal-content { 
                padding: 14px 12px !important; 
                max-width: 96% !important; 
                max-height: 94vh !important;
                overflow-y: auto !important;
            }
            .game-grid { width: 100% !important; gap: 9px; }
            .hole { height: 74px; }
            .bug { font-size: 46px; }
            
            #snakeCanvas { 
                max-width: 92vw !important; 
            }
            .snake-controls { 
                grid-template-columns: repeat(3, 58px); 
                gap: 12px; 
                margin: 22px auto 0;
                max-width: 240px;
            }
            .snake-controls button { 
                font-size: 2.35rem; 
                padding: 12px; 
                min-width: 58px;
                min-height: 58px;
                aspect-ratio: 1 / 1;
                line-height: 1;
            }
            .game-info { font-size: 1.05rem; }
        }

        /* Очень узкие экраны */
        @media (max-width: 360px) {
            .snake-controls { gap: 8px; }
            .snake-controls button { min-width: 52px; min-height: 52px; font-size: 2rem; }
        }

        @media (orientation: landscape) and (max-width: 768px) {
            html, body {
                height: auto !important;
                min-height: 100vh;
                overflow-y: auto !important;
                overflow-x: hidden;
            }
            body { padding-bottom: 70px !important; }
            
            .container { padding: 68px 16px 32px !important; }
            h1 { font-size: 1.95rem !important; margin: 8px 0 14px !important; }
            .display { font-size: 1.48rem !important; min-height: 118px !important; padding: 20px 16px !important; }
            button { font-size: 1.25rem !important; padding: 14px 42px !important; }
            
            .top-bar { 
                top: 12px !important; 
                right: 12px !important;
                padding: 5px 10px !important;
            }
            select { padding: 6px 10px !important; font-size: 0.85rem !important; }
            
            #logo { top: 8px !important; right: 8px !important; max-height: 60px !important; }
            #soundBtn { top: 8px !important; left: 8px !important; }
            
            #snakeCanvas { max-width: 70vw !important; }
            .snake-controls { 
                grid-template-columns: repeat(3, 50px); 
                gap: 12px; 
                max-width: 200px;
            }
            .snake-controls button { font-size: 2rem; min-width: 50px; min-height: 50px; }
        }
    </style>
</head>
<body>
    <img id="logo" src="logo.png" alt="IT Челлендж логотип">

    <button id="soundBtn" aria-label="Переключить звук">🔊 Звук включён</button>

    <div class="top-bar">
        <select id="categorySelect" aria-label="Выбор категории заданий"></select>
        <select id="themeSelect" aria-label="Выбор цветовой темы">
            <option value="neon" selected>🌟 Neon (оригинал)</option>
            <option value="forest">🌲 Forest</option>
            <option value="dusk">🌅 Dusk</option>
            <option value="ocean">🌊 Ocean</option>
        </select>
    </div>

    <div id="qrContainer">
        <div id="qrcode"></div>
        <p>Сканируй для открытия</p>
    </div>

    <!-- Пузырьки для ocean -->
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- Листья для Forest -->
    <div class="leaves" id="leavesContainer"></div>

    <!-- Огоньки для Dusk -->
    <div class="fireflies" id="firefliesContainer"></div>

    <!-- СКРЫТЫЙ ЗНАЧОК ИГРЫ -->
    <div id="gameTrigger" title="Скрытая игра">🐛</div>

    <!-- МОДАЛЬНОЕ ОКНО ИГРЫ -->
    <div id="gameModal" class="game-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">🐛 БЕЙ БАГИ!</h2>
                <button id="closeGameBtn" aria-label="Закрыть">✕</button>
            </div>
            
            <!-- БЕЙ БАГИ -->
            <div id="whacContainer">
                <div class="game-info">
                    <div>Время: <span id="gameTimer">30</span></div>
                    <div>Счёт: <span id="gameScore">0</span></div>
                    <div>Рекорд: <span id="gameHighScore">0</span></div>
                </div>
                <div id="gameGrid" class="game-grid"></div>
                <button id="startGameBtn">▶️ НАЧАТЬ ИГРУ</button>
                <div id="gameResult" style="display:none;">
                    ИГРА ОКОНЧЕНА!<br>
                    Твой счёт: <span id="finalScore">0</span>
                </div>
            </div>

            <!-- ЗМЕЙКА -->
            <div id="snakeContainer">
                <div id="snakeScoreDisplay">Счёт: <span id="snakeScore">0</span></div>
                <canvas id="snakeCanvas" width="320" height="320"></canvas>
                
                <!-- МОБИЛЬНЫЕ КНОПКИ УПРАВЛЕНИЯ -->
                <div class="snake-controls" id="snakeControls">
                    <div></div>
                    <button id="btnUp" aria-label="Вверх">↑</button>
                    <div></div>
                    <button id="btnLeft" aria-label="Влево">←</button>
                    <button id="btnDown" aria-label="Вниз">↓</button>
                    <button id="btnRight" aria-label="Вправо">→</button>
                </div>

                <button id="startSnakeBtn">▶️ НАЧАТЬ ЗМЕЙКУ</button>
                <div id="snakeResult" style="display:none;">
                    ИГРА ОКОНЧЕНА!<br>
                    Твой счёт: <span id="snakeFinalScore">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>🎲 IT ЧЕЛЛЕНДЖ</h1>
        <div id="result">✅ ГОТОВО! Вот твоё задание:</div>
        <div id="display" class="display">Загрузка...</div>
        <button id="spinBtn">🚀 КРУТИТЬ ЗАДАНИЕ!</button>
        <button id="copyBtn" class="copy-btn" style="display:none;">📋 Скопировать задание</button>
    </div>

    <script src="tasks.js"></script>
    <script>
        (function() {
            // === ЗАЩИТА ОТ ОТСУТСТВИЯ tasks.js ===
            if (!window.categories) {
                window.categories = { "По умолчанию": ["Задание не загружено. Проверьте подключение tasks.js"] };
            }

            // === ОСНОВНЫЕ ПЕРЕМЕННЫЕ ===
            let currentCategory = "";
            let currentTask = "";
            let isSpinning = false;
            let soundEnabled = true;
            let audioContext;
            let spinCount = 0;
            let gameMode = "whac"; // "whac" или "snake"

            // Для игр
            let gameScore = 0;
            let gameTimerInterval = null;
            let bugPopInterval = null;
            let gameActive = false;
            let highScore = localStorage.getItem('bugBusterHighScore') || 0;

            // Для змейки
            let snake = [];
            let dx = 1, dy = 0;
            let foodX, foodY;
            let snakeScore = 0;
            let snakeInterval = null;
            const tileCount = 20;
            let snakeCanvas, ctx;
            let snakeGameActive = false; // отдельный флаг для змейки

            // Звуки для тем
            const themeSounds = {
                neon:   {tick:[1100,1800], final:[523,659,784]},
                forest: {tick:[700,1100],  final:[392,523,659]},
                dusk:   {tick:[900,1400],  final:[440,554,698]},
                ocean:  {tick:[800,1300],  final:[523,659,880]}
            };

            // Типы багов (с визуальным признаком для отрицательных)
            const bugTypes = [
                {emoji: '🪲', points: 10, negative: false},
                {emoji: '🐜', points: -20, negative: true},
                {emoji: '🐛', points: -30, negative: true}
            ];

            // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
            function getAudioContext() {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                return audioContext;
            }

            function resumeAudioContext() {
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            }

            function playSpinTick() {
                if (!soundEnabled) return;
                const ctx = getAudioContext();
                resumeAudioContext();
                const t = themeSounds[document.documentElement.dataset.theme || 'neon'];
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.value = t.tick[Math.floor(Math.random()*t.tick.length)];
                gain.gain.value = 0.11;
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start();
                setTimeout(()=>{gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.04);osc.stop(ctx.currentTime+0.06)},12);
            }

            function playFinalSound() {
                if (!soundEnabled) return;
                const ctx = getAudioContext();
                resumeAudioContext();
                const t = themeSounds[document.documentElement.dataset.theme || 'neon'];
                t.final.forEach((freq,i)=>{
                    setTimeout(()=>{
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type='sine'; osc.frequency.value=freq; gain.gain.value=0.24;
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start();
                        gain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.3);
                        osc.stop(ctx.currentTime+1.5);
                    },i*75);
                });
            }

            function playGameSound(type) {
                if (!soundEnabled) return;
                const ctx = getAudioContext();
                resumeAudioContext();
                if (type === 'good' || type === 'eat') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = type === 'eat' ? 1380 : 920;
                    gain.gain.value = 0.28;
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start();
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.18);
                    osc.stop(ctx.currentTime + 0.25);
                } else if (type === 'bad' || type === 'miss') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.value = 180;
                    gain.gain.value = 0.35;
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start();
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.25);
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'over') {
                    [620, 480, 340].forEach((f,i) => {
                        setTimeout(() => {
                            const osc = ctx.createOscillator();
                            const gain = ctx.createGain();
                            osc.type = 'sine';
                            osc.frequency.value = f;
                            gain.gain.value = 0.3;
                            osc.connect(gain); gain.connect(ctx.destination);
                            osc.start();
                            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
                            osc.stop(ctx.currentTime + 0.7);
                        }, i * 90);
                    });
                }
            }

            // === АНИМАЦИИ ФОНА (листья, огоньки) ===
            function createLeaves() {
                const container = document.getElementById('leavesContainer');
                container.innerHTML = '';
                const leafTypes = ['🍂', '🍃', '🌿', '🍁'];
                for (let i = 0; i < 14; i++) {
                    const leaf = document.createElement('div');
                    leaf.className = 'leaf';
                    leaf.textContent = leafTypes[Math.floor(Math.random() * leafTypes.length)];
                    const left = Math.random() * 100;
                    const duration = 12 + Math.random() * 18;
                    const delay = Math.random() * -25;
                    const size = 22 + Math.random() * 18;
                    leaf.style.left = `${left}vw`;
                    leaf.style.fontSize = `${size}px`;
                    leaf.style.animationDuration = `${duration}s`;
                    leaf.style.animationDelay = `${delay}s`;
                    leaf.style.opacity = 0.65 + Math.random() * 0.3;
                    container.appendChild(leaf);
                }
            }

            function createFireflies() {
                const container = document.getElementById('firefliesContainer');
                container.innerHTML = '';
                for (let i = 0; i < 18; i++) {
                    const fly = document.createElement('div');
                    fly.className = 'firefly';
                    const left = Math.random() * 100;
                    const top = Math.random() * 70;
                    const duration = 15 + Math.random() * 25;
                    const delay = Math.random() * -30;
                    const size = 4 + Math.random() * 5;
                    const dx = (Math.random() - 0.5) * 380;
                    const dy = 120 + Math.random() * 280;
                    fly.style.left = `${left}vw`;
                    fly.style.top = `${top}vh`;
                    fly.style.width = `${size}px`;
                    fly.style.height = `${size}px`;
                    fly.style.animationDuration = `${duration}s`;
                    fly.style.animationDelay = `${delay}s`;
                    fly.style.setProperty('--dx', `${dx}px`);
                    fly.style.setProperty('--dy', `${dy}px`);
                    container.appendChild(fly);
                }
            }

            // === ИГРА "БЕЙ БАГИ" ===
            function createGameGrid() {
                const grid = document.getElementById('gameGrid');
                grid.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    const hole = document.createElement('div');
                    hole.className = 'hole';
                    hole.addEventListener('click', handleHoleClick);
                    grid.appendChild(hole);
                }
            }

            function handleHoleClick(e) {
                if (!gameActive) return;
                const hole = e.currentTarget;
                const bug = hole.querySelector('.bug');
                if (bug) {
                    const pts = parseInt(bug.dataset.points);
                    const explosion = document.createElement('div');
                    explosion.className = 'explosion';
                    explosion.textContent = '💥';
                    hole.appendChild(explosion);
                    setTimeout(() => explosion.remove(), 700);
                    bug.remove(); // немедленное удаление, чтобы не было повторного клика
                    gameScore = Math.max(0, gameScore + pts);
                    document.getElementById('gameScore').textContent = gameScore;
                    playGameSound(pts > 0 ? 'good' : 'bad');
                } else {
                    const error = document.createElement('div');
                    error.className = 'error-mark';
                    error.textContent = '❌';
                    hole.appendChild(error);
                    setTimeout(() => error.remove(), 700);
                    gameScore = Math.max(0, gameScore - 5);
                    document.getElementById('gameScore').textContent = gameScore;
                    playGameSound('miss');
                }
            }

            function popBug() {
                if (!gameActive) return;
                const holes = document.querySelectorAll('.hole');
                const randomIndex = Math.floor(Math.random() * 9);
                const hole = holes[randomIndex];
                if (hole.querySelector('.bug')) return;

                const type = bugTypes[Math.floor(Math.random() * bugTypes.length)];
                const bug = document.createElement('div');
                bug.className = 'bug' + (type.negative ? ' negative' : '');
                bug.textContent = type.emoji;
                bug.dataset.points = type.points;
                hole.appendChild(bug);

                setTimeout(() => {
                    if (bug.parentNode) {
                        bug.remove(); // просто удаляем, если не успели кликнуть
                    }
                }, 900);
            }

            function startBugGame() {
                gameActive = true;
                gameScore = 0;
                document.getElementById('gameScore').textContent = '0';
                document.getElementById('startGameBtn').style.display = 'none';
                document.getElementById('gameResult').style.display = 'none';
                let timeLeft = 30;
                document.getElementById('gameTimer').textContent = timeLeft;

                if (gameTimerInterval) clearInterval(gameTimerInterval);
                if (bugPopInterval) clearInterval(bugPopInterval);

                gameTimerInterval = setInterval(() => {
                    timeLeft--;
                    document.getElementById('gameTimer').textContent = timeLeft;
                    if (timeLeft <= 0) endBugGame();
                }, 1000);

                bugPopInterval = setInterval(popBug, 420);
            }

            function endBugGame() {
                gameActive = false;
                if (gameTimerInterval) clearInterval(gameTimerInterval);
                if (bugPopInterval) clearInterval(bugPopInterval);
                document.getElementById('startGameBtn').style.display = 'block';
                const resultEl = document.getElementById('gameResult');
                resultEl.style.display = 'block';
                document.getElementById('finalScore').textContent = gameScore;
                if (gameScore > highScore) {
                    highScore = gameScore;
                    localStorage.setItem('bugBusterHighScore', highScore);
                    document.getElementById('gameHighScore').textContent = highScore;
                    // Показать сообщение о рекорде
                    const recordMsg = document.createElement('div');
                    recordMsg.className = 'record-message';
                    recordMsg.textContent = '🏆 НОВЫЙ РЕКОРД!';
                    resultEl.appendChild(recordMsg);
                    setTimeout(() => recordMsg.remove(), 3000);
                }
            }

            // === ЗМЕЙКА ===
            function initSnake() {
                snake = [{x: 10, y: 10}];
                dx = 1; dy = 0;
                snakeScore = 0;
                document.getElementById('snakeScore').textContent = snakeScore;
                placeFood();
                drawSnake();
            }

            function placeFood() {
                foodX = Math.floor(Math.random() * tileCount);
                foodY = Math.floor(Math.random() * tileCount);
                for (let seg of snake) {
                    if (seg.x === foodX && seg.y === foodY) {
                        placeFood(); // рекурсивный вызов, но не страшно
                        return;
                    }
                }
            }

            function drawSnake() {
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, snakeCanvas.width, snakeCanvas.height);
                ctx.fillStyle = '#a3e635';
                for (let seg of snake) {
                    ctx.fillRect(seg.x * 16, seg.y * 16, 16, 16);
                }
                ctx.fillStyle = '#f43f5e';
                ctx.fillRect(foodX * 16, foodY * 16, 16, 16);
            }

            function moveSnake() {
                if (!snakeGameActive) return;
                const head = {x: snake[0].x + dx, y: snake[0].y + dy};
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x === head.x && s.y === head.y)) {
                    endSnakeGame();
                    return;
                }
                snake.unshift(head);
                if (head.x === foodX && head.y === foodY) {
                    snakeScore += 10;
                    document.getElementById('snakeScore').textContent = snakeScore;
                    placeFood();
                    playGameSound('eat');
                    // Визуальный эффект при поедании (мигание)
                    ctx.save();
                    ctx.fillStyle = '#ffff00';
                    ctx.globalAlpha = 0.5;
                    ctx.fillRect(foodX * 16, foodY * 16, 16, 16);
                    setTimeout(() => { ctx.restore(); drawSnake(); }, 100);
                } else {
                    snake.pop();
                }
                drawSnake();
            }

            function endSnakeGame() {
                snakeGameActive = false;
                clearInterval(snakeInterval);
                playGameSound('over');
                document.getElementById('snakeResult').style.display = 'block';
                document.getElementById('snakeFinalScore').textContent = snakeScore;
                document.getElementById('startSnakeBtn').style.display = 'block';
            }

            function startSnakeGame() {
                if (snakeGameActive) return;
                // Очищаем предыдущий интервал, если был
                if (snakeInterval) clearInterval(snakeInterval);
                snakeGameActive = true;
                document.getElementById('startSnakeBtn').style.display = 'none';
                document.getElementById('snakeResult').style.display = 'none';
                initSnake();
                snakeInterval = setInterval(moveSnake, 140);
            }

            function changeDirection(newDx, newDy) {
                if (!snakeGameActive || gameMode !== "snake") return;
                if (newDx === -dx && newDy === 0) return;
                if (newDx === 0 && newDy === -dy) return;
                dx = newDx;
                dy = newDy;
            }

            // === УПРАВЛЕНИЕ ЗВУКОМ ===
            function toggleSound() {
                soundEnabled = !soundEnabled;
                document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 Звук включён' : '🔇 Звук выключен';
            }

            // === ВРАЩАЛКА ===
            function startSpin() {
                if (isSpinning) return;
                // Активируем аудио на случай, если пользователь сразу нажмёт кнопку
                resumeAudioContext();

                const tasks = window.categories?.[currentCategory] || [];
                if (tasks.length === 0) {
                    document.getElementById('display').textContent = "Нет заданий в категории 😔";
                    document.getElementById('result').style.display = 'block';
                    return; // isSpinning остаётся false
                }

                isSpinning = true;
                document.getElementById('result').style.display = 'none';
                document.getElementById('copyBtn').style.display = 'none';
                const display = document.getElementById('display');
                display.classList.remove('glow');

                let delay = 18, step = 0, total = 68;

                function spinLoop() {
                    currentTask = tasks[Math.floor(Math.random() * tasks.length)];
                    display.textContent = currentTask;
                    playSpinTick();
                    step++;
                    if (step > 45) delay = 45 + (step-45)*11;
                    if (step > 58) delay = 120 + (step-58)*28;

                    if (step < total) setTimeout(spinLoop, delay);
                    else {
                        isSpinning = false;
                        display.classList.add('glow');
                        document.getElementById('result').style.display = 'block';
                        document.getElementById('copyBtn').style.display = 'inline-block';
                        playFinalSound();

                        spinCount++;
                        const trigger = document.getElementById('gameTrigger');
                        if (spinCount >= 5) {
                            trigger.style.display = 'block';
                            trigger.classList.add('pulse');
                        }
                        if (spinCount >= 10) {
                            gameMode = "snake";
                            trigger.textContent = '🐍';
                            trigger.title = 'Змейка';
                        }
                    }
                }
                spinLoop();
            }

            function copyTask() {
                if (!currentTask) return;
                navigator.clipboard.writeText(currentTask).then(() => {
                    const btn = document.getElementById('copyBtn');
                    const old = btn.textContent;
                    btn.textContent = "✅ СКОПИРОВАНО!";
                    setTimeout(() => btn.textContent = old, 1800);
                });
            }

            // === ОТКРЫТИЕ/ЗАКРЫТИЕ МОДАЛКИ ===
            function openGameModal() {
                const modal = document.getElementById('gameModal');
                modal.style.display = 'flex';
                // Завершаем любую активную игру перед открытием
                if (gameActive) endBugGame();
                if (snakeGameActive) endSnakeGame();

                if (gameMode === "snake") {
                    document.getElementById('whacContainer').style.display = 'none';
                    document.getElementById('snakeContainer').style.display = 'block';
                    document.getElementById('modalTitle').textContent = '🐍 ЗМЕЙКА!';
                    
                    snakeCanvas = document.getElementById('snakeCanvas');
                    ctx = snakeCanvas.getContext('2d');
                    // Не меняем размер canvas программно, только CSS
                    document.getElementById('startSnakeBtn').style.display = 'block';
                    document.getElementById('snakeResult').style.display = 'none';
                } else {
                    document.getElementById('snakeContainer').style.display = 'none';
                    document.getElementById('whacContainer').style.display = 'block';
                    document.getElementById('modalTitle').textContent = '🐛 БЕЙ БАГИ!';
                    createGameGrid(); // пересоздаём сетку для сброса
                    document.getElementById('gameHighScore').textContent = highScore;
                    document.getElementById('startGameBtn').style.display = 'block';
                    document.getElementById('gameResult').style.display = 'none';
                    document.getElementById('gameScore').textContent = '0';
                }
            }

            function closeGameModal() {
                const modal = document.getElementById('gameModal');
                modal.style.display = 'none';
                if (gameActive) endBugGame();
                if (snakeGameActive) endSnakeGame();
            }

            // === ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ ===
            window.addEventListener('load', () => {
                const catSelect = document.getElementById('categorySelect');
                const themeSelect = document.getElementById('themeSelect');
                const bubbles = document.querySelector('.bubbles');
                const leavesContainer = document.getElementById('leavesContainer');
                const firefliesContainer = document.getElementById('firefliesContainer');
                const cats = window.categories || {};

                // Заполнение категорий
                Object.keys(cats).forEach(name => {
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name;
                    catSelect.appendChild(opt);
                });

                if (Object.keys(cats).length > 0) {
                    const first = Object.keys(cats)[0];
                    catSelect.value = first;
                    currentCategory = first;
                    // Показываем случайное задание при загрузке
                    const tasks = cats[first];
                    if (tasks.length > 0) {
                        document.getElementById('display').textContent = tasks[Math.floor(Math.random() * tasks.length)];
                    }
                } else {
                    document.getElementById('display').textContent = "Нет категорий";
                }

                catSelect.addEventListener('change', () => currentCategory = catSelect.value);

                // Анимации фона
                createLeaves();
                createFireflies();

                // Смена темы
                themeSelect.addEventListener('change', () => {
                    const theme = themeSelect.value;
                    document.documentElement.dataset.theme = theme;
                    bubbles.style.display = (theme === 'ocean') ? 'block' : 'none';
                    leavesContainer.style.display = (theme === 'forest') ? 'block' : 'none';
                    firefliesContainer.style.display = (theme === 'dusk') ? 'block' : 'none';
                });

                const initialTheme = themeSelect.value;
                bubbles.style.display = (initialTheme === 'ocean') ? 'block' : 'none';
                leavesContainer.style.display = (initialTheme === 'forest') ? 'block' : 'none';
                firefliesContainer.style.display = (initialTheme === 'dusk') ? 'block' : 'none';

                // Подписки на события
                document.getElementById('spinBtn').addEventListener('click', startSpin);
                document.getElementById('copyBtn').addEventListener('click', copyTask);
                document.getElementById('soundBtn').addEventListener('click', toggleSound);

                document.getElementById('gameHighScore').textContent = highScore;

                // Открытие модалки по клику на скрытую иконку
                document.getElementById('gameTrigger').addEventListener('click', openGameModal);

                // Закрытие модалки
                document.getElementById('closeGameBtn').addEventListener('click', closeGameModal);

                // Кнопки старта игр
                document.getElementById('startGameBtn').addEventListener('click', startBugGame);
                document.getElementById('startSnakeBtn').addEventListener('click', startSnakeGame);

                // Управление змейкой с клавиатуры
                document.addEventListener('keydown', e => {
                    if (gameMode !== "snake" || !snakeGameActive) return;
                    switch (e.key) {
                        case "ArrowUp":    changeDirection(0, -1); e.preventDefault(); break;
                        case "ArrowDown":  changeDirection(0, 1); e.preventDefault(); break;
                        case "ArrowLeft":  changeDirection(-1, 0); e.preventDefault(); break;
                        case "ArrowRight": changeDirection(1, 0); e.preventDefault(); break;
                    }
                });

                // Управление змейкой с мобильных кнопок (подписка один раз)
                const up = document.getElementById('btnUp');
                const down = document.getElementById('btnDown');
                const left = document.getElementById('btnLeft');
                const right = document.getElementById('btnRight');

                up.addEventListener('click', () => changeDirection(0, -1));
                down.addEventListener('click', () => changeDirection(0, 1));
                left.addEventListener('click', () => changeDirection(-1, 0));
                right.addEventListener('click', () => changeDirection(1, 0));

                up.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, -1); });
                down.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(0, 1); });
                left.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(-1, 0); });
                right.addEventListener('touchstart', (e) => { e.preventDefault(); changeDirection(1, 0); });

                // Свайпы на canvas
                let touchStartX = 0, touchStartY = 0;
                snakeCanvas = document.getElementById('snakeCanvas');
                snakeCanvas.addEventListener('touchstart', e => {
                    touchStartX = e.changedTouches[0].screenX;
                    touchStartY = e.changedTouches[0].screenY;
                }, {passive: true});
                snakeCanvas.addEventListener('touchend', e => {
                    if (!snakeGameActive) return;
                    const touchEndX = e.changedTouches[0].screenX;
                    const touchEndY = e.changedTouches[0].screenY;
                    const deltaX = touchEndX - touchStartX;
                    const deltaY = touchEndY - touchStartY;
                    if (Math.abs(deltaX) > Math.abs(deltaY) + 10) {
                        if (deltaX > 40) changeDirection(1, 0);
                        else if (deltaX < -40) changeDirection(-1, 0);
                    } else if (Math.abs(deltaY) > Math.abs(deltaX) + 10) {
                        if (deltaY > 40) changeDirection(0, 1);
                        else if (deltaY < -40) changeDirection(0, -1);
                    }
                }, {passive: true});

                // QR-код для десктопа
                if (window.innerWidth > 768) {
                    new QRCode(document.getElementById("qrcode"), {
                        text: window.location.href,
                        width: 168, height: 168,
                        colorDark: "#000000", colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }

                // Активация аудио при любом взаимодействии с игровыми кнопками
                document.querySelectorAll('button, .hole, .snake-controls button').forEach(el => {
                    el.addEventListener('click', resumeAudioContext);
                });
            });
        })();
    </script>
</body>
</html>
