<!DOCTYPE html>
<html lang="ru" data-theme="neon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎲 Графический Челлендж</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@700&display=swap');

        :root {
            --accent: #60a5fa;
            --button: #1e40af;
            --bg1: #0f172a;
            --bg2: #1e2937;
            --text: #f1f5f9;
            --star-speed: 30s;
        }
        [data-theme="neon"]   { --accent:#00ffea; --button:#ff00aa; --bg1:#0f0c29; --bg2:#302b63; --text:#f0f9ff; --star-speed:25s; }
        [data-theme="forest"] { --accent:#5eead4; --button:#065f46; --bg1:#052e16; --bg2:#14532d; --text:#ecfdf5; --star-speed:40s; }
        [data-theme="dusk"]   { --accent:#d8b4fe; --button:#5b21b6; --bg1:#1e1238; --bg2:#312e81; --text:#f3e8ff; --star-speed:35s; }
        [data-theme="ocean"]  { --accent:#7dd3fc; --button:#0c4a6e; --bg1:#0c4a6e; --bg2:#164e63; --text:#e0f2fe; --star-speed:28s; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            position: relative;
            min-height: 100vh;
            overflow-y: auto;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.09) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: stars var(--star-speed) linear infinite;
            pointer-events: none;
        }
        @keyframes stars { 0% { background-position: 0 0 } 100% { background-position: 400px 400px } }

        #logo {
            position: absolute;
            top: 10px;
            right: 10px;
            max-height: var(--logo-size, 100px);
            max-width: 140px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px var(--accent));
            z-index: 20;
            pointer-events: none;
        }

        #soundBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.12);
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            z-index: 60;
        }

        .top-bar {
            position: relative;
            z-index: 70;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 70px 0 20px;
            padding: 0 15px;
        }

        select {
            background: rgba(255,255,255,0.12);
            border: 2px solid var(--accent);
            color: #111;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            min-width: 130px;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 920px;
            padding: 20px 16px 60px;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1.9rem, 7vw, 2.5rem);
            margin: 0 0 20px;
            text-shadow: 0 0 18px var(--accent);
            color: var(--accent);
        }

        #result {
            display: none;
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            color: var(--button);
            text-shadow: 0 0 12px var(--button);
            margin-bottom: 16px;
            font-weight: bold;
        }

        .display {
            background: rgba(255,255,255,0.08);
            border: 5px solid var(--accent);
            border-radius: 18px;
            padding: clamp(20px, 5vw, 35px) 18px;
            min-height: 160px;
            font-size: clamp(1.35rem, 5vw, 1.9rem);
            line-height: 1.4;
            margin: 0 auto 20px;
            max-width: 92%;
            box-shadow: 0 0 50px rgba(0,255,234,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all .4s;
        }

        .display.glow {
            animation: finalGlow 1.3s infinite alternate;
            border-color: var(--button);
        }
        @keyframes finalGlow {
            from { box-shadow: 0 0 50px rgba(0,255,234,0.6); }
            to   { box-shadow: 0 0 120px var(--button), 0 0 160px var(--accent); }
        }

        button, .copy-btn {
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            transition: all .3s;
            touch-action: manipulation;
            border: none;
            border-radius: 14px;
        }
        button {
            font-size: clamp(1.15rem, 5vw, 1.5rem);
            padding: clamp(14px, 5vw, 18px) clamp(40px, 8vw, 55px);
            background: var(--button);
            color: white;
            box-shadow: 0 0 30px var(--button);
            margin: 15px 0;
        }
        .copy-btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            background: var(--accent);
            color: #000;
        }

        #qrContainer {
            position: fixed;
            bottom: 15px;
            left: 15px;
            z-index: 25;
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,255,234,0.4);
            text-align: center;
            max-width: 160px;
        }
        #qrContainer p { font-size: 0.78rem; margin: 6px 0 0; color: #111; }

        /* Адаптация */
        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .top-bar { margin: 80px 0 30px; }
            #logo { max-height: 80px; top: 8px; right: 8px; }
            #soundBtn { top: 8px; left: 8px; padding: 6px 10px; font-size: 0.85rem; }
            .container { padding-bottom: 80px; }
        }

        @media (orientation: landscape) and (max-height: 520px) {
            body { padding-top: 10px; }
            .top-bar {
                margin: 50px 0 15px;
                flex-direction: row;
                gap: 8px;
            }
            select { font-size: 0.85rem; padding: 6px 10px; min-width: 110px; }
            .container { padding: 10px 12px 40px; }
            h1 { font-size: 1.8rem; margin-bottom: 12px; }
            .display { min-height: 110px; font-size: 1.2rem; padding: 12px 14px; }
            button { padding: 10px 30px; font-size: 0.95rem; margin: 8px 0; }
            #logo { max-height: 60px; }
            #soundBtn { padding: 5px 8px; font-size: 0.8rem; }
        }

        @media (max-width: 480px) and (orientation: portrait) {
            .top-bar { flex-direction: column; gap: 12px; }
            select { width: 80%; max-width: 260px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <img id="logo" src="logo.png" alt="Логотип">
    <button id="soundBtn">🔊 Звук включён</button>

    <div class="top-bar">
        <select id="categorySelect"></select>
        <select id="themeSelect">
            <option value="neon" selected>🌟 Neon (оригинал)</option>
            <option value="forest">🌲 Forest</option>
            <option value="dusk">🌅 Dusk</option>
            <option value="ocean">🌊 Ocean</option>
        </select>
    </div>

    <div id="qrContainer" style="display:none;">
        <div id="qrcode"></div>
        <p>Сканируй для открытия</p>
    </div>

    <div class="container">
        <h1>🎲 ГРАФИЧЕСКИЙ ЧЕЛЛЕНДЖ</h1>
        <div id="result">✅ ГОТОВО! Вот твоё задание:</div>
        <div id="display" class="display">Нажми «КРУТИТЬ!», чтобы получить задание!</div>
        <button id="spinBtn">🚀 КРУТИТЬ ЗАДАНИЕ!</button>
        <button id="copyBtn" class="copy-btn" style="display:none;">📋 Скопировать задание</button>
    </div>

    <script src="tasks.js"></script>
    <script>
        let currentCategory = "";
        let currentTask = "";
        let isSpinning = false;
        let soundEnabled = true;
        let audioContext;

        const themeSounds = {
            neon:   { tick: [1100,1800], final: [523,659,784] },
            forest: { tick: [700,1100],  final: [392,523,659] },
            dusk:   { tick: [900,1400],  final: [440,554,698] },
            ocean:  { tick: [800,1300],  final: [523,659,880] }
        };

        function getAudioContext() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            return audioContext;
        }

        function playSpinTick() {
            if (!soundEnabled) return;
            const theme = document.documentElement.dataset.theme || 'neon';
            const t = themeSounds[theme];
            const ctx = getAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = t.tick[Math.floor(Math.random() * t.tick.length)];
            gain.gain.value = 0.11;
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start();
            setTimeout(() => {
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.04);
                osc.stop(ctx.currentTime + 0.06);
            }, 12);
        }

        function playFinalSound() {
            if (!soundEnabled) return;
            const theme = document.documentElement.dataset.theme || 'neon';
            const t = themeSounds[theme];
            const ctx = getAudioContext();
            t.final.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine'; osc.frequency.value = freq; gain.gain.value = 0.24;
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start();
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.3);
                    osc.stop(ctx.currentTime + 1.5);
                }, i * 75);
            });
        }

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            const resultEl = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');
            const display = document.getElementById('display');

            resultEl.style.display = 'none';
            copyBtn.style.display = 'none';
            display.classList.remove('glow');

            const tasks = window.categories?.[currentCategory] || [];
            if (tasks.length === 0) {
                display.textContent = "Нет заданий в категории 😔";
                isSpinning = false;
                resultEl.style.display = 'block';
                return;
            }

            let delay = 18, step = 0, total = 68;

            function spinLoop() {
                currentTask = tasks[Math.floor(Math.random() * tasks.length)];
                display.textContent = currentTask;
                playSpinTick();
                step++;
                if (step > 45) delay = 45 + (step-45)*11;
                if (step > 58) delay = 120 + (step-58)*28;

                if (step < total) setTimeout(spinLoop, delay);
                else {
                    isSpinning = false;
                    display.classList.add('glow');
                    resultEl.style.display = 'block';
                    copyBtn.style.display = 'inline-block';
                    playFinalSound();
                }
            }
            spinLoop();
        }

        function copyTask() {
            if (!currentTask) return;
            navigator.clipboard.writeText(currentTask).then(() => {
                const btn = document.getElementById('copyBtn');
                const old = btn.textContent;
                btn.textContent = "✅ СКОПИРОВАНО!";
                setTimeout(() => btn.textContent = old, 1800);
            });
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 Звук включён' : '🔇 Звук выключен';
        }

        window.addEventListener('load', () => {
            const catSelect = document.getElementById('categorySelect');
            const themeSelect = document.getElementById('themeSelect');
            const cats = window.categories || {};

            Object.keys(cats).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                catSelect.appendChild(opt);
            });

            if (Object.keys(cats).length > 0) {
                const first = Object.keys(cats)[0];
                catSelect.value = first;
                currentCategory = first;
            }

            catSelect.addEventListener('change', () => currentCategory = catSelect.value);

            themeSelect.addEventListener('change', () => {
                document.documentElement.dataset.theme = themeSelect.value;
            });

            document.getElementById('spinBtn').addEventListener('click', startSpin);
            document.getElementById('copyBtn').addEventListener('click', copyTask);
            document.getElementById('soundBtn').addEventListener('click', toggleSound);  // ← здесь фикс кнопки звука

            // QR только на десктопе
            if (window.innerWidth > 768) {
                document.getElementById('qrContainer').style.display = 'block';
                new QRCode(document.getElementById("qrcode"), {
                    text: window.location.href,
                    width: 168, height: 168,
                    colorDark: "#000000", colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }

            // Разблокировка аудио после первого тача/клика
            document.body.addEventListener('touchstart', () => {
                if (audioContext) audioContext.resume();
            }, { once: true });
        });
    </script>
</body>
</html>
