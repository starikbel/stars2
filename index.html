<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎲 Графический Челлендж — Рандом Задание</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@700&display=swap');

        :root {
            --logo-size: 140px;
        }

        html, body {
            height: 100dvh; /* критично для Samsung в landscape */
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            animation: stars 25s linear infinite;
        }

        @keyframes stars { 0% { background-position: 0 0; } 100% { background-position: 300px 300px; } }

        #logo { position: absolute; top: 20px; right: 20px; height: auto; max-height: var(--logo-size); width: auto; max-width: 180px; object-fit: contain; filter: drop-shadow(0 0 25px #00ffea); z-index: 20; pointer-events: none; }

        .container { text-align: center; z-index: 10; max-width: 920px; padding: 40px 25px 30px; width: 100%; }

        h1 { font-family: 'Press Start 2P', cursive; font-size: 2.8rem; margin: 15px 0 35px; text-shadow: 0 0 20px #00ffea, 0 0 40px #00ffea; color: #00ffea; }

        #result { display: none; font-size: 1.35rem; color: #ff00aa; text-shadow: 0 0 15px #ff00aa; margin-bottom: 18px; font-weight: bold; }

        .display { background: rgba(255,255,255,0.1); border: 6px solid #00ffea; border-radius: 20px; padding: 45px 30px; min-height: 240px; font-size: 2.15rem; line-height: 1.35; margin: 0 auto 25px; max-width: 820px; box-shadow: 0 0 60px rgba(0, 255, 234, 0.6); display: flex; align-items: center; justify-content: center; text-align: center; transition: all 0.4s; }

        .display.glow { animation: finalGlow 1.2s infinite alternate; border-color: #ff00aa; }

        @keyframes finalGlow { from { box-shadow: 0 0 60px rgba(0, 255, 234, 0.7); } to { box-shadow: 0 0 130px #ff00aa, 0 0 180px #00ffea; } }

        button { font-family: 'Press Start 2P', cursive; font-size: 1.65rem; padding: 22px 65px; background: #ff00aa; color: white; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 0 35px #ff00aa; transition: all 0.3s; margin-bottom: 20px; }

        button:hover { transform: scale(1.08); box-shadow: 0 0 70px #ff00aa; }

        .copy-btn { padding: 14px 35px; font-size: 1.2rem; background: #00ffea; color: #000; }

        #soundBtn { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.15); border: 2px solid #00ffea; color: #00ffea; padding: 8px 16px; font-size: 1rem; border-radius: 8px; cursor: pointer; z-index: 30; }

        #qrContainer { position: absolute; bottom: 25px; left: 25px; z-index: 25; background: #ffffff; padding: 12px; border-radius: 12px; box-shadow: 0 0 25px rgba(0, 255, 234, 0.5); text-align: center; display: none; } /* скрыт на мобильных */

        /* ====================== СПЕЦИАЛЬНО ДЛЯ SAMSUNG S23 ULTRA И БОЛЬШИХ ТЕЛЕФОНОВ ====================== */
        @media (orientation: landscape) and (min-width: 800px) {
            :root { --logo-size: 72px; }
            #logo { max-width: 80px; top: 10px; right: 10px; }
            h1 { font-size: 1.65rem; margin: 5px 0 15px; }
            .display { font-size: 1.38rem; padding: 22px 18px; min-height: 130px; margin-bottom: 15px; }
            button { font-size: 1.25rem; padding: 14px 32px; margin-bottom: 10px; }
            .copy-btn { font-size: 1.05rem; padding: 11px 26px; }
            #result { font-size: 1.05rem; margin-bottom: 8px; }
            .container { padding: 15px 20px; }
            #soundBtn { top: 8px; left: 8px; padding: 5px 10px; font-size: 0.82rem; }
            #qrContainer { display: none !important; }
        }

        /* остальные медиа-запросы (вертикальная мобильная) остаются как раньше */
        @media (max-width: 768px) and (orientation: portrait) {
            :root { --logo-size: 95px; }
            #logo { max-width: 105px; top: 15px; right: 15px; }
            h1 { font-size: 2.1rem; margin: 10px 0 25px; }
            .display { font-size: 1.65rem; padding: 35px 20px; min-height: 190px; }
            button { font-size: 1.45rem; padding: 18px 40px; }
        }
    </style>
</head>
<body>
    <img id="logo" src="logo.png" alt="Твой логотип">
    <button id="soundBtn" onclick="toggleSound()">🔊 Звук включён</button>

    <div id="qrContainer">
        <div id="qrcode"></div>
        <p>Сканируй для открытия</p>
    </div>

    <div class="container">
        <h1>🎲 ГРАФИЧЕСКИЙ ЧЕЛЛЕНДЖ</h1>
        <div id="result">✅ ГОТОВО! Вот твоё задание:</div>
        <div id="display" class="display">Нажми «КРУТИТЬ!», чтобы получить задание!</div>
        <button onclick="startSpin()">🚀 КРУТИТЬ ЗАДАНИЕ!</button>
        <button id="copyBtn" onclick="copyTask()" class="copy-btn" style="display:none;">📋 Скопировать задание</button>
    </div>

    <script src="tasks.js"></script>
    <script>
        // (весь твой текущий JS с звуками и спином остаётся без изменений — просто вставь сюда свой старый скрипт из предыдущей версии)

    </script>
</body>
</html>
