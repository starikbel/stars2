<!DOCTYPE html>
<html lang="ru" data-theme="neon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 IT Челлендж</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@700&display=swap');

        :root {
            --accent: #60a5fa;
            --button: #1e40af;
            --bg1: #0f172a;
            --bg2: #1e2937;
            --text: #f1f5f9;
            --star-speed: 30s;
        }

        [data-theme="neon"]   { --accent:#00ffea; --button:#ff00aa; --bg1:#0f0c29; --bg2:#302b63; --text:#f0f9ff; --star-speed:25s; }
        [data-theme="forest"] { --accent:#bef264; --button:#3f6212; --bg1:#0a2e17; --bg2:#1a472a; --text:#f1fae8; --star-speed:38s; }
        [data-theme="dusk"]   { --accent:#f472b6; --button:#6d28d9; --bg1:#1a0f2e; --bg2:#3b1e5a; --text:#f5efff; --star-speed:32s; }
        [data-theme="ocean"]  { --accent:#06b6d4; --button:#0c4a6e; --bg1:#0e2b3d; --bg2:#0f5e7a; --text:#e0f7ff; --star-speed:22s; }

        html, body { height: 100vh; margin: 0; padding: 0; overflow: hidden; }

        body {
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.09) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: stars var(--star-speed) linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes stars { 0% { background-position: 0 0 } 100% { background-position: 400px 400px } }

        .bg-animation {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        /* ────────────────────────────────────────────────
           OCEAN — исправленная версия (2025–2026)
        ──────────────────────────────────────────────── */
     [data-theme="ocean"] {
        --accent:     #06b6d4;       /* яркий бирюзово-голубой */
        --button:     #0c4a6e;
        --bg1:        #0e2b3d;       /* глубокий океан */
        --bg2:        #0f5e7a;       /* средний бирюзовый */
        --text:       #e0f7ff;       /* очень светлый голубовато-белый */
        --star-speed: 22s;           /* чуть быстрее звёздочки для ощущения движения воды */
    }

        /* Плавающие пузырьки — только для ocean */
    [data-theme="ocean"] body::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 1;
    }

        [data-theme="ocean"] body::after::before,
    [data-theme="ocean"] body::after::after,
    [data-theme="ocean"] .bubble {
        content: "";
        position: absolute;
        background: rgba(255,255,255,0.25);
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(255,255,255,0.4);
        animation: float 12s infinite linear;
    }

    [data-theme="ocean"] .bubble:nth-child(1) { width: 20px; height: 20px; left: 10%; animation-duration: 18s; animation-delay: 0s; }
    [data-theme="ocean"] .bubble:nth-child(2) { width: 35px; height: 35px; left: 25%; animation-duration: 22s; animation-delay: 3s; }
    [data-theme="ocean"] .bubble:nth-child(3) { width: 15px; height: 15px; left: 40%; animation-duration: 15s; animation-delay: 6s; }
    [data-theme="ocean"] .bubble:nth-child(4) { width: 28px; height: 28px; left: 60%; animation-duration: 20s; animation-delay: 9s; }
    [data-theme="ocean"] .bubble:nth-child(5) { width: 40px; height: 40px; left: 75%; animation-duration: 25s; animation-delay: 12s; }
    [data-theme="ocean"] .bubble:nth-child(6) { width: 18px; height: 18px; left: 85%; animation-duration: 16s; animation-delay: 2s; }

    @keyframes float {
        0%   { bottom: -10%; opacity: 0.1; transform: translateX(0); }
        50%  { opacity: 0.7; transform: translateX(15px); }
        100% { bottom: 110%; opacity: 0; transform: translateX(-10px); }
    }

        @keyframes bubbleRise {
            0% {
                transform: translateY(0) scale(var(--scale, 1));
                opacity: 0;
            }
            10% {
                opacity: 0.9;
            }
            90% {
                opacity: 0.85;
            }
            100% {
                transform: translateY(-120vh) scale(calc(var(--scale, 1) * 1.25));
                opacity: 0;
            }
        }

        /* Forest и Dusk оставляем без изменений */
        [data-theme="forest"] .leaf {
            position: absolute;
            width: 24px;
            height: 14px;
            background: linear-gradient(to bottom right, #bef264, #84cc16);
            border-radius: 60% 40% 50% 50% / 60% 50% 40% 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            opacity: 0;
            animation: leafFall linear infinite;
        }

        @keyframes leafFall {
            0%   { transform: translateY(0) rotate(var(--start-rotate, -20deg)); opacity: 0; }
            10%  { opacity: 0.9; }
            50%  { transform: translateY(50vh) translateX(calc(120px * sin(var(--osc)))) rotate(calc(var(--start-rotate) + 180deg)); }
            100% { transform: translateY(110vh) translateX(calc(180px * sin(var(--osc) + 3))) rotate(calc(var(--start-rotate) + 720deg)); opacity: 0; }
        }

        [data-theme="dusk"] .spark {
            position: absolute;
            background: #f472b6;
            border-radius: 50%;
            box-shadow: 0 0 16px #f472b6, 0 0 32px #fb923c, inset 0 0 6px #ffffff44;
            animation: sparkFall linear infinite;
        }

        @keyframes sparkFall {
            0%   { transform: translateY(0) scale(var(--scale,1)); opacity: 0.2; }
            15%  { opacity: 1; }
            100% { transform: translateY(110vh) scale(calc(var(--scale,1) * 0.4)); opacity: 0; }
        }

        #logo { position: absolute; top: 20px; right: 20px; max-height: var(--logo-size,140px); max-width: 180px; object-fit: contain; filter: drop-shadow(0 0 25px var(--accent)); z-index: 20; pointer-events: none; }

        .top-bar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 70; display: flex; gap: 12px; }
        select { background: rgba(255,255,255,0.15); border: 2px solid var(--accent); color: #111 !important; padding: 9px 16px; border-radius: 10px; font-size: 1rem; cursor: pointer; }

        .container { text-align: center; z-index: 10; max-width: 920px; padding: 85px 25px 30px; width: 100%; }
        h1 { font-family: 'Press Start 2P', cursive; font-size: 2.8rem; margin: 15px 0 25px; text-shadow: 0 0 20px var(--accent); color: var(--accent); }

        #result { display: none; font-size: 1.35rem; color: var(--button); text-shadow: 0 0 15px var(--button); margin-bottom: 18px; font-weight: bold; }
        .display { background: rgba(255,255,255,0.1); border: 6px solid var(--accent); border-radius: 20px; padding: 45px 30px; min-height: 240px; font-size: 2.15rem; line-height: 1.35; margin: 0 auto 25px; max-width: 820px; box-shadow: 0 0 60px rgba(0,255,234,0.4); display: flex; align-items: center; justify-content: center; text-align: center; transition: all .4s; }
        .display.glow { animation: finalGlow 1.2s infinite alternate; border-color: var(--button); }
        @keyframes finalGlow { from { box-shadow: 0 0 60px rgba(0,255,234,0.7) } to { box-shadow: 0 0 130px var(--button), 0 0 180px var(--accent) } }

        button, .copy-btn { font-family: 'Press Start 2P', cursive; cursor: pointer; transition: all .3s; touch-action: manipulation; z-index: 50; }
        button { font-size: 1.65rem; padding: 22px 65px; background: var(--button); color: white; border: none; border-radius: 15px; box-shadow: 0 0 35px var(--button); margin-bottom: 20px; }
        .copy-btn { padding: 14px 35px; font-size: 1.2rem; background: var(--accent); color: #000; }

        #soundBtn { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.15); border: 2px solid var(--accent); color: var(--accent); padding: 8px 16px; font-size: 1rem; border-radius: 8px; cursor: pointer; z-index: 60; }

        #qrContainer { position: absolute; bottom: 25px; left: 25px; z-index: 25; background: #fff; padding: 12px; border-radius: 14px; box-shadow: 0 0 30px rgba(0,255,234,0.5); text-align: center; max-width: 178px; }
        #qrContainer p { max-width: 168px; font-size: 0.82rem; margin: 8px 0 0 0; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width:768px) {
            body { overflow-y: auto; height: auto; min-height: 100vh; }
            .top-bar { position: static; transform: none; margin: 90px auto 30px; width: 90%; max-width: 380px; flex-direction: column; gap: 14px; }
            select { width: 100%; font-size: 1.1rem; padding: 12px; }
            .container { padding: 20px 18px 80px; }
            h1 { font-size: 2.1rem; margin: 10px 0 20px; }
            .display { font-size: 1.6rem; padding: 30px 20px; min-height: 180px; }
            button { font-size: 1.3rem; padding: 18px 50px; }
            #logo { top: 12px; right: 12px; max-height: 90px; }
            #soundBtn { top: 12px; left: 12px; padding: 7px 14px; font-size: 0.95rem; }
            #qrContainer { display: none !important; }
        }

        @media (max-width:480px) {
            h1 { font-size: 1.8rem; }
            .display { font-size: 1.4rem; min-height: 160px; }
            button { padding: 16px 40px; font-size: 1.15rem; }
        }

        @media (orientation: landscape) and (max-height: 520px) {
            .top-bar { margin: 60px auto 20px; flex-direction: row; gap: 10px; width: 96%; }
            select { font-size: 0.95rem; padding: 8px 12px; min-width: 0; flex: 1; }
            .container { padding: 10px 16px 60px; }
            h1 { font-size: 1.7rem; margin: 8px 0 12px; }
            .display { min-height: 120px; font-size: 1.25rem; padding: 18px 16px; }
            button { padding: 12px 40px; font-size: 1rem; margin: 10px 0; }
            #logo { max-height: 70px; top: 8px; right: 8px; }
            #soundBtn { top: 8px; left: 8px; padding: 6px 12px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <img id="logo" src="logo.png" alt="Логотип">

    <button id="soundBtn">🔊 Звук включён</button>

    <div class="top-bar">
        <select id="categorySelect"></select>
        <select id="themeSelect">
            <option value="neon" selected>🌟 Neon (оригинал)</option>
            <option value="forest">🌲 Forest</option>
            <option value="dusk">🌅 Dusk</option>
            <option value="ocean">🌊 Ocean</option>
        </select>
    </div>

    <div id="qrContainer">
        <div id="qrcode"></div>
        <p>Сканируй для открытия</p>
    </div>

    <!-- Фоновая анимация -->
    <div class="bg-animation">
        <!-- Ocean: 12 пузырьков — больше шансов увидеть движение -->
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>

        <!-- Forest: 8 листьев -->
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>
        <div class="leaf"></div><div class="leaf"></div><div class="leaf"></div><div class="leaf"></div>

        <!-- Dusk: 12 искр -->
        <div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div>
        <div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div>
        <div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div>
    </div>

    <div class="container">
        <h1>🚀 IT ЧЕЛЛЕНДЖ</h1>
        <div id="result">✅ ГОТОВО! Вот твоё задание:</div>
        <div id="display" class="display">Нажми «КРУТИТЬ!», чтобы получить задание!</div>
        <button id="spinBtn">💻 КРУТИТЬ ЗАДАНИЕ!</button>
        <button id="copyBtn" class="copy-btn" style="display:none;">📋 Скопировать задание</button>
    </div>

    <script src="tasks.js"></script>
    <script>
        let currentCategory = "";
        let currentTask = "";
        let isSpinning = false;
        let soundEnabled = true;
        let audioContext;

        const themeSounds = {
            neon:   {tick:[1100,1800], final:[523,659,784]},
            forest: {tick:[700,1100],  final:[392,523,659]},
            dusk:   {tick:[900,1400],  final:[440,554,698]},
            ocean:  {tick:[800,1300],  final:[523,659,880]}
        };

        function getAudioContext() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            return audioContext;
        }

        function playSpinTick() {
            if (!soundEnabled) return;
            const t = themeSounds[document.documentElement.dataset.theme || 'neon'];
            const ctx = getAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = t.tick[Math.floor(Math.random()*t.tick.length)];
            gain.gain.value = 0.11;
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start();
            setTimeout(()=>{gain.gain.linearRampToValueAtTime(0,ctx.currentTime+0.04);osc.stop(ctx.currentTime+0.06)},12);
        }

        function playFinalSound() {
            if (!soundEnabled) return;
            const t = themeSounds[document.documentElement.dataset.theme || 'neon'];
            const ctx = getAudioContext();
            t.final.forEach((freq,i)=>{
                setTimeout(()=>{
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type='sine'; osc.frequency.value=freq; gain.gain.value=0.24;
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start();
                    gain.gain.linearRampToValueAtTime(0,ctx.currentTime+1.3);
                    osc.stop(ctx.currentTime+1.5);
                },i*75);
            });
        }

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('result').style.display = 'none';
            document.getElementById('copyBtn').style.display = 'none';
            const display = document.getElementById('display');
            display.classList.remove('glow');

            let delay = 18, step = 0, total = 68;
            const tasks = window.categories?.[currentCategory] || [];

            if (tasks.length === 0) {
                display.textContent = "Нет заданий в категории 😔";
                isSpinning = false;
                document.getElementById('result').style.display = 'block';
                return;
            }

            function spinLoop() {
                currentTask = tasks[Math.floor(Math.random() * tasks.length)];
                display.textContent = currentTask;
                playSpinTick();
                step++;
                if (step > 45) delay = 45 + (step-45)*11;
                if (step > 58) delay = 120 + (step-58)*28;

                if (step < total) setTimeout(spinLoop, delay);
                else {
                    isSpinning = false;
                    display.classList.add('glow');
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('copyBtn').style.display = 'inline-block';
                    playFinalSound();
                }
            }
            spinLoop();
        }

        function copyTask() {
            if (!currentTask) return;
            navigator.clipboard.writeText(currentTask).then(() => {
                const btn = document.getElementById('copyBtn');
                const old = btn.textContent;
                btn.textContent = "✅ СКОПИРОВАНО!";
                setTimeout(() => btn.textContent = old, 1800);
            });
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 Звук включён' : '🔇 Звук выключен';
        }

        window.addEventListener('load', () => {
            const catSelect = document.getElementById('categorySelect');
            const themeSelect = document.getElementById('themeSelect');
            const bubbles = document.querySelectorAll('.bubble');
            const leaves  = document.querySelectorAll('.leaf');
            const sparks  = document.querySelectorAll('.spark');
            const cats = window.categories || {};

            function randomizeElements(elements, startFromBottom = false, type) {
                elements.forEach(el => {
                    const randomLeft = Math.random() * 96 + 2;
                    el.style.left = `${randomLeft}%`;

                    if (startFromBottom) {
                        // Ocean — более надёжный старт снизу
                        const randomBottom = -15 - Math.random() * 50;  // от -15% до -65%
                        el.style.bottom = `${randomBottom}%`;
                        el.style.top = 'auto';
                    } else {
                        const randomTop = -8 - Math.random() * 40;
                        el.style.top = `${randomTop}%`;
                        el.style.bottom = 'auto';
                    }

                    const randomOsc = Math.random() * Math.PI * 2;
                    el.style.setProperty('--osc', randomOsc);

                    let duration, scale, size;

                    if (type === 'bubble') {
                        scale = Math.random() * 3.2 + 1.4;           // 1.4 – 4.6×
                        duration = Math.random() * 10 + 12;          // 12–22 сек
                        el.style.setProperty('--scale', scale);
                    }
                    else if (type === 'leaf') {
                        scale = Math.random() * 0.7 + 0.7;
                        duration = Math.random() * 12 + 14;
                        const startRotate = Math.random() * 80 - 40;
                        el.style.setProperty('--start-rotate', `${startRotate}deg`);
                        el.style.width  = `${24 * scale}px`;
                        el.style.height = `${14 * scale}px`;
                    }
                    else if (type === 'spark') {
                        scale = Math.random() * 1.8 + 0.8;
                        duration = Math.random() * 8 + 9;
                        el.style.setProperty('--scale', scale);
                        size = 5 + Math.random() * 5;
                        el.style.width = el.style.height = `${size}px`;
                    }

                    el.style.animationDuration = `${duration}s`;
                    el.style.animationDelay = `-${Math.random() * duration * 0.85}s`;
                });
            }

            randomizeElements(bubbles, true,  'bubble');
            randomizeElements(leaves,  false, 'leaf');
            randomizeElements(sparks,  false, 'spark');

            Object.keys(cats).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                catSelect.appendChild(opt);
            });

            if (Object.keys(cats).length > 0) {
                const first = Object.keys(cats)[0];
                catSelect.value = first;
                currentCategory = first;
            }

            catSelect.addEventListener('change', () => currentCategory = catSelect.value);

            themeSelect.addEventListener('change', () => {
                document.documentElement.dataset.theme = themeSelect.value;
                updateAnimations(themeSelect.value);
            });

            function updateAnimations(theme) {
                bubbles.forEach(b => b.style.display = (theme === 'ocean')  ? 'block' : 'none');
                leaves.forEach (l => l.style.display = (theme === 'forest') ? 'block' : 'none');
                sparks.forEach (s => s.style.display = (theme === 'dusk')   ? 'block' : 'none');
            }

            updateAnimations(themeSelect.value);

            document.getElementById('spinBtn').addEventListener('click', startSpin);
            document.getElementById('copyBtn').addEventListener('click', copyTask);
            document.getElementById('soundBtn').addEventListener('click', toggleSound);

            if (window.innerWidth > 768) {
                new QRCode(document.getElementById("qrcode"), {
                    text: window.location.href,
                    width: 168, height: 168,
                    colorDark: "#000000", colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }

            document.body.addEventListener('click', () => {
                getAudioContext().resume();
            }, { once: true });
        });
    </script>
</body>
</html>
