<!DOCTYPE html>
<html lang="ru" data-theme="neon">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎲 Графический Челлендж</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@700&display=swap');

        :root {
            --accent: #60a5fa;
            --button: #1e40af;
            --bg1: #0f172a;
            --bg2: #1e2937;
            --text: #f1f5f9;
            --star-speed: 30s;
        }

        /* Темы — улучшен контраст текста */
        [data-theme="neon"]   {
            --accent: #00ffea;
            --button: #ff00aa;
            --bg1: #0f0c29;
            --bg2: #302b63;
            --text: #f0f9ff;
            --star-speed: 25s;
        }
        [data-theme="forest"] {
            --accent: #5eead4;     /* более яркий акцент */
            --button: #065f46;
            --bg1: #052e16;
            --bg2: #14532d;
            --text: #ecfdf5;       /* очень светлый зелёно-белый */
            --star-speed: 40s;
        }
        [data-theme="dusk"]   {
            --accent: #d8b4fe;
            --button: #5b21b6;
            --bg1: #1e1238;
            --bg2: #312e81;
            --text: #f3e8ff;       /* светлый лавандовый */
            --star-speed: 35s;
        }
        [data-theme="ocean"]  {
            --accent: #7dd3fc;
            --button: #0c4a6e;
            --bg1: #0c4a6e;
            --bg2: #164e63;
            --text: #e0f2fe;       /* светлый голубой */
            --star-speed: 28s;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.09) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: stars var(--star-speed) linear infinite;
            pointer-events: none;
        }

        @keyframes stars {
            0% { background-position: 0 0; }
            100% { background-position: 400px 400px; }
        }

        #logo {
            position: absolute;
            top: 12px;
            right: 12px;
            max-height: var(--logo-size, 110px);
            max-width: 160px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px var(--accent));
            z-index: 20;
            pointer-events: none;
        }

        .top-bar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 70;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
            max-width: 420px;
        }

        select {
            background: rgba(255,255,255,0.12);
            border: 2px solid var(--accent);
            color: #111;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            min-width: 140px;
        }

        .container {
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 920px;
            padding: 80px 20px 40px;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1.8rem, 7vw, 2.6rem);
            margin: 10px 0 20px;
            text-shadow: 0 0 18px var(--accent);
            color: var(--accent);
            line-height: 1.2;
        }

        #result {
            display: none;
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            color: var(--button);
            text-shadow: 0 0 12px var(--button);
            margin-bottom: 16px;
            font-weight: bold;
        }

        .display {
            background: rgba(255,255,255,0.08);
            border: 5px solid var(--accent);
            border-radius: 18px;
            padding: clamp(20px, 5vw, 40px) 20px;
            min-height: 180px;
            font-size: clamp(1.4rem, 5vw, 2rem);
            line-height: 1.4;
            margin: 0 auto 20px;
            max-width: 90%;
            box-shadow: 0 0 50px rgba(0,255,234,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all .4s;
            box-sizing: border-box;
        }

        .display.glow {
            animation: finalGlow 1.3s infinite alternate;
            border-color: var(--button);
        }

        @keyframes finalGlow {
            from { box-shadow: 0 0 50px rgba(0,255,234,0.6); }
            to   { box-shadow: 0 0 120px var(--button), 0 0 160px var(--accent); }
        }

        button, .copy-btn {
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
            transition: all .3s;
            touch-action: manipulation;
            z-index: 50;
            border: none;
            border-radius: 14px;
        }

        button {
            font-size: clamp(1.2rem, 5vw, 1.55rem);
            padding: clamp(14px, 5vw, 20px) clamp(40px, 8vw, 60px);
            background: var(--button);
            color: white;
            box-shadow: 0 0 30px var(--button);
            margin: 15px 0;
        }

        .copy-btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            background: var(--accent);
            color: #000;
        }

        #soundBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.12);
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            font-size: 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            z-index: 60;
        }

        #qrContainer {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 25;
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,255,234,0.4);
            text-align: center;
            max-width: 160px;
        }

        #qrContainer p {
            font-size: 0.78rem;
            margin: 6px 0 0;
            color: #111;
        }

        /* Мобильная адаптация + landscape */
        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .container { padding: 70px 16px 60px; }
            .top-bar { top: 8px; gap: 8px; width: 96%; }
            select { font-size: 0.9rem; padding: 7px 12px; min-width: 120px; }
            #soundBtn { top: 8px; left: 8px; padding: 6px 10px; font-size: 0.85rem; }
            button { padding: 16px 40px; font-size: 1.15rem; }
            .display { min-height: 160px; padding: 20px 16px; font-size: 1.45rem; }
            #logo { top: 8px; right: 8px; max-height: 90px; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.9rem; margin: 8px 0 16px; }
            .display { font-size: 1.3rem; min-height: 140px; }
            button { padding: 14px 36px; font-size: 1.05rem; }
        }

        /* Горизонтальная ориентация на мобильных */
        @media (orientation: landscape) and (max-height: 500px) {
            body { justify-content: flex-start; padding-top: 10px; }
            .container { padding: 50px 20px 20px; }
            .top-bar { top: 4px; transform: translateX(-50%) scale(0.9); }
            .display { min-height: 120px; font-size: 1.25rem; padding: 16px 14px; }
            button { padding: 12px 32px; font-size: 1rem; margin: 10px 0; }
            #logo { max-height: 70px; }
            #soundBtn { padding: 5px 10px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <img id="logo" src="logo.png" alt="Логотип">

    <div class="top-bar">
        <select id="categorySelect"></select>
        <select id="themeSelect">
            <option value="neon" selected>🌟 Neon (оригинал)</option>
            <option value="forest">🌲 Forest</option>
            <option value="dusk">🌅 Dusk</option>
            <option value="ocean">🌊 Ocean</option>
        </select>
    </div>

    <button id="soundBtn">🔊 Звук включён</button>

    <div id="qrContainer">
        <div id="qrcode"></div>
        <p>Сканируй для открытия</p>
    </div>

    <div class="container">
        <h1>🎲 ГРАФИЧЕСКИЙ ЧЕЛЛЕНДЖ</h1>
        <div id="result">✅ ГОТОВО! Вот твоё задание:</div>
        <div id="display" class="display">Нажми «КРУТИТЬ!», чтобы получить задание!</div>
        <button id="spinBtn">🚀 КРУТИТЬ ЗАДАНИЕ!</button>
        <button id="copyBtn" class="copy-btn" style="display:none;">📋 Скопировать задание</button>
    </div>

    <script src="tasks.js"></script>
    <script>
        let currentCategory = "";
        let currentTask = "";
        let isSpinning = false;
        let soundEnabled = true;
        let audioContext;

        const themeSounds = {
            neon:   { tick: [1100,1800], final: [523,659,784] },
            forest: { tick: [700,1100],  final: [392,523,659] },
            dusk:   { tick: [900,1400],  final: [440,554,698] },
            ocean:  { tick: [800,1300],  final: [523,659,880] }
        };

        function getAudioContext() {
            if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
            return audioContext;
        }

        function playSpinTick() {
            if (!soundEnabled) return;
            const theme = document.documentElement.dataset.theme || 'neon';
            const t = themeSounds[theme];
            const ctx = getAudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = t.tick[Math.floor(Math.random() * t.tick.length)];
            gain.gain.value = 0.11;
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start();
            setTimeout(() => {
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.04);
                osc.stop(ctx.currentTime + 0.06);
            }, 12);
        }

        function playFinalSound() {
            if (!soundEnabled) return;
            const theme = document.documentElement.dataset.theme || 'neon';
            const t = themeSounds[theme];
            const ctx = getAudioContext();
            t.final.forEach((freq, i) => {
                setTimeout(() => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine'; osc.frequency.value = freq; gain.gain.value = 0.24;
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start();
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.3);
                    osc.stop(ctx.currentTime + 1.5);
                }, i * 75);
            });
        }

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;

            const resultEl = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');
            const display = document.getElementById('display');

            resultEl.style.display = 'none';
            copyBtn.style.display = 'none';
            display.classList.remove('glow');

            const tasks = window.categories?.[currentCategory] || [];
            if (tasks.length === 0) {
                display.textContent = "Нет заданий в категории 😔";
                isSpinning = false;
                resultEl.style.display = 'block';
                return;
            }

            let delay = 18, step = 0, total = 68;

            function spinLoop() {
                currentTask = tasks[Math.floor(Math.random() * tasks.length)];
                display.textContent = currentTask;
                playSpinTick();
                step++;
                if (step > 45) delay = 45 + (step-45)*11;
                if (step > 58) delay = 120 + (step-58)*28;

                if (step < total) setTimeout(spinLoop, delay);
                else {
                    isSpinning = false;
                    display.classList.add('glow');
                    resultEl.style.display = 'block';
                    copyBtn.style.display = 'inline-block';
                    playFinalSound();
                }
            }
            spinLoop();
        }

        function copyTask() {
            if (!currentTask) return;
            navigator.clipboard.writeText(currentTask).then(() => {
                const btn = document.getElementById('copyBtn');
                const old = btn.textContent;
                btn.textContent = "✅ СКОПИРОВАНО!";
                setTimeout(() => btn.textContent = old, 1800);
            });
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 Звук включён' : '🔇 Звук выключен';
        }

        window.addEventListener('load', () => {
            const catSelect = document.getElementById('categorySelect');
            const themeSelect = document.getElementById('themeSelect');
            const cats = window.categories || {};

            Object.keys(cats).forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                catSelect.appendChild(opt);
            });

            if (Object.keys(cats).length > 0) {
                const first = Object.keys(cats)[0];
                catSelect.value = first;
                currentCategory = first;
            }

            catSelect.addEventListener('change', () => currentCategory = catSelect.value);

            themeSelect.addEventListener('change', () => {
                document.documentElement.dataset.theme = themeSelect.value;
            });

            document.getElementById('spinBtn').addEventListener('click', startSpin);
            document.getElementById('copyBtn').addEventListener('click', copyTask);

            if (window.innerWidth > 768) {
                new QRCode(document.getElementById("qrcode"), {
                    text: window.location.href,
                    width: 168, height: 168,
                    colorDark: "#000000", colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }

            document.body.addEventListener('click', () => {
                if (audioContext) audioContext.resume();
            }, { once: true });
        });
    </script>
</body>
</html>
