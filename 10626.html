<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITILANDIA // CREATIVE WHEEL 4.2 PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap');

        :root {
            --accent-color: #d4af37;
            --accent-glow: rgba(214, 175, 55, 0.15);
            --bg-color: #070708;
            --font-primary: 'Montserrat', sans-serif;
            --font-accent: 'Playfair Display', serif;
            --card-bg: linear-gradient(180deg, rgba(255,255,255,0.01) 0%, rgba(255,255,255,0) 100%);
            --border-color: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: #f5f5f7;
            font-family: var(--font-primary);
            letter-spacing: 0.05em;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: background-color 0.8s ease, color 0.5s ease;
            position: relative;
        }

        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 15% 15%, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
            transition: background 0.8s ease;
        }

        /* Fullscreen Matrix and Confetti Canvases */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99;
            pointer-events: none;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* HEADER & XP PROGRESS */
        header {
            padding: 25px 20px 10px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .xp-badge-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .xp-bar-container {
            width: 220px;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            border: 1.5px solid rgba(255, 255, 255, 0.03);
        }

        .xp-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-color), #ffffff);
            border-radius: 3px;
            transition: width 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .level-text {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-color);
        }

        .brand-sub {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            color: var(--accent-color);
            margin-bottom: 8px;
            font-weight: 700;
            transition: color 0.5s ease;
        }

        h1 {
            font-family: var(--font-accent);
            font-size: 2.2rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.02em;
            color: #ffffff;
            line-height: 1.2;
        }

        h1 span {
            font-family: var(--font-primary);
            font-style: normal;
            font-weight: 300;
            font-size: 1.6rem;
            color: #a1a1a6;
            display: block;
            letter-spacing: 0.12em;
            margin-top: 5px;
        }

        /* NAVIGATION TABS */
        main {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
            z-index: 10;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .tabs-wrapper {
            position: relative;
            width: 100%;
            max-width: 950px;
            margin-bottom: 25px;
            padding: 0 40px;
        }

        .tabs-wrapper::before, .tabs-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 35px;
            z-index: 5;
            pointer-events: none;
        }
        .tabs-wrapper::before {
            left: 40px;
            background: linear-gradient(to right, var(--bg-color), transparent);
        }
        .tabs-wrapper::after {
            right: 40px;
            background: linear-gradient(to left, var(--bg-color), transparent);
        }

        .tabs {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            cursor: grab;
            user-select: none;
        }

        .tabs:active { cursor: grabbing; }
        .tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: none;
            border: none;
            color: #6e6e73;
            font-family: var(--font-primary);
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            padding: 8px 18px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            white-space: nowrap;
            flex-shrink: 0;
            z-index: 6;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 0;
            width: 100%;
            height: 1.5px;
            background-color: var(--accent-color);
            transform: scaleX(0);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.5s ease;
        }

        .tab-btn:hover { color: #f5f5f7; }
        .tab-btn.active { color: #ffffff; }
        .tab-btn.active::after { transform: scaleX(1); }

        .tab-btn.special-tab {
            color: var(--accent-color);
            border: 1px solid rgba(214, 175, 55, 0.2);
            border-radius: 20px;
            padding: 7px 16px;
        }
        .tab-btn.special-tab.active {
            background: rgba(214, 175, 55, 0.1);
            border-color: var(--accent-color);
        }
        .tab-btn.special-tab::after { display: none; }

        .tab-btn.marathon-tab {
            color: #e5e5ea;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 7px 16px;
        }
        .tab-btn.marathon-tab.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: #ffffff;
            color: #ffffff;
        }
        .tab-btn.marathon-tab::after { display: none; }

        /* PLAY ZONE */
        .playzone {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            margin-bottom: 25px;
        }

        .wheel-wrapper {
            position: relative;
            width: 380px;
            height: 380px;
            flex-shrink: 0;
        }

        .wheel-pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 24px;
            z-index: 15;
            filter: drop-shadow(0px 4px 12px var(--accent-color));
            transition: filter 0.5s ease;
        }

        .wheel-pointer svg {
            width: 100%;
            height: 100%;
            fill: var(--accent-color);
            transition: fill 0.5s ease;
        }

        #wheelCanvas {
            border-radius: 50%;
            display: block;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.03);
            background-color: #09090a;
            transition: box-shadow 0.5s ease;
        }

        /* DISPLAY AND CHALLENGE AREA */
        .display-container {
            flex-grow: 1;
            min-height: 350px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 100%;
        }

        .placeholder-text {
            font-size: 11px;
            color: #6e6e73;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 500;
        }

        .task-title {
            font-size: 11px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-weight: 600;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.5s ease, color 0.5s ease;
        }

        .task-text {
            font-size: 16px;
            line-height: 1.6;
            color: #ffffff;
            font-weight: 300;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            margin-bottom: 20px;
        }

        .task-text.show, .task-title.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* CONSTRUCTOR OUTPUT */
        .triple-result {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
            width: 100%;
            padding: 5px 0;
        }

        .triple-part {
            border-left: 2px solid var(--accent-color);
            padding-left: 15px;
            transition: border-color 0.5s ease;
        }

        .triple-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 3px;
        }

        .triple-val {
            font-size: 13px;
            color: #ffffff;
            font-weight: 300;
            line-height: 1.4;
        }

        /* GAMIFICATION MODULES (TIMER, XP SYSTEM) */
        .action-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .copy-btn, .done-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #a1a1a6;
            padding: 8px 16px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        .done-btn {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .done-btn:hover {
            background: var(--accent-color);
            color: #000000;
        }

        .copy-btn.show, .done-btn.show {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        .copy-btn:hover {
            color: #ffffff;
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.02);
        }

        .copy-btn svg {
            width: 12px;
            height: 12px;
            fill: currentColor;
        }

        /* Challenge Timer Elements */
        .timer-container {
            margin-top: 15px;
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .timer-container.show {
            display: flex;
            opacity: 1;
        }

        .timer-presets {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .timer-preset-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a1a1a6;
            font-size: 8px;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }

        .timer-preset-btn:hover {
            border-color: var(--accent-color);
            color: #ffffff;
        }

        .timer-display {
            font-family: var(--font-primary);
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
            transition: text-shadow 0.3s ease, color 0.3s ease;
        }

        .timer-display.danger {
            color: #ff3b30;
            text-shadow: 0 0 10px rgba(255, 59, 48, 0.5);
            animation: pulseWarning 1s infinite;
        }

        @keyframes pulseWarning {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .timer-progress {
            width: 80%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            margin-top: 5px;
            border-radius: 1px;
            overflow: hidden;
        }

        .timer-progress-fill {
            width: 100%;
            height: 100%;
            background: var(--accent-color);
            transition: width 1s linear;
        }

        /* SPIN TRIGGER */
        .trigger-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 45px;
            font-family: var(--font-primary);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            cursor: pointer;
            border-radius: 0px;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
            z-index: 10;
        }

        .trigger-btn:hover {
            background-color: #f5f5f7;
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.08);
        }

        .trigger-btn:active { transform: translateY(0); }
        .trigger-btn:disabled {
            background-color: #1c1c1e;
            color: #48484a;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* QUEST LOG (HISTORY DRAWER) */
        .quest-log-drawer {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100%;
            background: rgba(7, 7, 8, 0.95);
            backdrop-filter: blur(25px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: -20px 0 50px rgba(0,0,0,0.8);
            z-index: 900;
            transition: right 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
        }

        .quest-log-drawer.open {
            right: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .drawer-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-color);
        }

        .drawer-close {
            background: none;
            border: none;
            color: #a1a1a6;
            cursor: pointer;
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .drawer-close:hover { color: #ffffff; }

        .quest-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-right: 5px;
        }

        .quest-list::-webkit-scrollbar {
            width: 2px;
        }
        .quest-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
        }

        .quest-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            padding: 12px;
            font-size: 11px;
            line-height: 1.5;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .quest-item:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--accent-color);
        }

        .quest-item-subject {
            font-size: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .drawer-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(7, 7, 8, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #ffffff;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .drawer-trigger:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .drawer-trigger svg {
            width: 16px;
            height: 16px;
            fill: var(--accent-color);
        }

        /* FOOTER & TERMINAL */
        footer {
            padding: 20px;
            text-align: center;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #3a3a3c;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            z-index: 10;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .terminal-container {
            display: flex;
            gap: 5px;
            align-items: center;
            opacity: 0.3;
            transition: opacity 0.3s ease;
        }

        .terminal-container:hover, .terminal-container:focus-within {
            opacity: 1;
        }

        .terminal-input {
            background: none;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            font-family: var(--font-primary);
            font-size: 8px;
            color: #ffffff;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            width: 120px;
            outline: none;
            padding: 3px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .terminal-input:focus {
            border-color: var(--accent-color);
            width: 160px;
        }

        /* MEDIA ADAPTATION */
        @media (max-width: 900px) {
            .playzone { flex-direction: column; gap: 30px; }
            .display-container { width: 100%; max-width: 380px; min-height: 240px; }
        }

        @media (max-width: 500px) {
            h1 { font-size: 1.8rem; }
            h1 span { font-size: 1.3rem; }
            .tabs-wrapper { padding: 0 10px; }
            .tabs-wrapper::before, .tabs-wrapper::after { width: 15px; }
            .tabs { gap: 4px; }
            .tab-btn { padding: 6px 10px; font-size: 8px; }
            .wheel-wrapper { width: 290px; height: 290px; }
            #wheelCanvas { width: 290px; height: 290px; }
            .drawer-trigger { bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <div class="ambient-glow" id="ambientGlow"></div>
    <canvas id="matrixCanvas"></canvas>
    <canvas id="confettiCanvas"></canvas>

    <header>
        <div class="xp-badge-container">
            <div class="level-text" id="levelName">НОВИЧОК (УРОВЕНЬ 1)</div>
            <div class="xp-bar-container">
                <div class="xp-bar-fill" id="xpBarFill"></div>
            </div>
            <div class="level-text" id="xpDisplayVal">0 / 300 XP</div>
        </div>
        <div class="brand-sub" id="brandSub">АЙТИЛАНДИЯ // ACADEMY OF FUTURE CREATIVES</div>
        <h1>Айтиландия <span id="brandTitle">CREATIVE WHEEL v4.2 PRO</span></h1>
    </header>

    <main>
        <!-- Horizontal Scrollable Tabs -->
        <div class="tabs-wrapper">
            <div class="tabs" id="subjectTabs">
                <button class="tab-btn active" onclick="switchSubject('photoshop', this)">Photoshop</button>
                <button class="tab-btn" onclick="switchSubject('illustrator', this)">Illustrator</button>
                <button class="tab-btn" onclick="switchSubject('blender', this)">Blender</button>
                <button class="tab-btn" onclick="switchSubject('ai', this)">ИИ Промптинг</button>
                <button class="tab-btn" onclick="switchSubject('python', this)">Python Art</button>
                <button class="tab-btn" onclick="switchSubject('krita', this)">Krita Рисование</button>
                <button class="tab-btn" onclick="switchSubject('aftereffects', this)">After Effects</button>
                <button class="tab-btn" onclick="switchSubject('figma', this)">Figma UX</button>
                <button class="tab-btn special-tab" onclick="switchSubject('constructor', this)">⚡ Конструктор</button>
                <button class="tab-btn marathon-tab" onclick="switchSubject('marathon', this)">🏃‍♂️ Марафон</button>
            </div>
        </div>

        <div class="playzone">
            <!-- Canvas Wheel -->
            <div class="wheel-wrapper">
                <div class="wheel-pointer" id="wheelPointer">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 21l-8.2-13h16.4z"/>
                    </svg>
                </div>
                <canvas id="wheelCanvas" width="380" height="380"></canvas>
            </div>

            <!-- Task Display Container -->
            <div class="display-container">
                <div id="placeholder" class="placeholder-text">Крути колесо и получай крутой челлендж!</div>
                <div id="taskTitle" class="task-title">ТВОЙ СУПЕР-ЧЕЛЛЕНДЖ</div>
                <div id="taskDisplay" class="task-text"></div>
                
                <!-- Action Controls -->
                <div class="action-row">
                    <button id="copyBtn" class="copy-btn" onclick="copyTaskToClipboard()">
                        <svg viewBox="0 0 24 24">
                            <path d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/>
                        </svg>
                        <span id="copyBtnText">Скопировать</span>
                    </button>
                    <button id="doneBtn" class="done-btn" onclick="claimXP()">
                        Выполнено! (+100 XP)
                    </button>
                </div>

                <!-- Sleek Challenge Timer Interface -->
                <div class="timer-container" id="timerContainer">
                    <div class="timer-presets" id="timerPresets">
                        <button class="timer-preset-btn" onclick="startTimer(15)">15 м</button>
                        <button class="timer-preset-btn" onclick="startTimer(30)">30 м</button>
                        <button class="timer-preset-btn" onclick="startTimer(45)">45 м</button>
                    </div>
                    <div class="timer-display" id="timerDisplay">15:00</div>
                    <div class="timer-progress">
                        <div class="timer-progress-fill" id="timerProgressFill"></div>

    <script>
        // --- ADVANCED AUDIO ENGINE (Web Audio API Synthesis) ---
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTickSound() {
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(650, now);
                osc.frequency.exponentialRampToValueAtTime(120, now + 0.04);

                gain.gain.setValueAtTime(0.06, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);

                osc.start(now);
                osc.stop(now + 0.04);
            } catch (e) {}
        }

        function playSoftClick() {
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(550, now + 0.06);

                gain.gain.setValueAtTime(0.02, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);

                osc.start(now);
                osc.stop(now + 0.06);
            } catch (e) {}
        }

        function playTimerWarningClick() {
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

                osc.start(now);
                osc.stop(now + 0.15);
            } catch (e) {}
        }

        function playVictoryChime() {
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const arpeggio = [261.63, 329.63, 392.00, 523.25];
                
                arpeggio.forEach((frequency, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();

                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.type = 'sine';
                    const startTime = now + (index * 0.08);
                    
                    osc.frequency.setValueAtTime(frequency, startTime);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.1, startTime + 0.04);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.5);

                    osc.start(startTime);
                    osc.stop(startTime + 0.5);
                });
            } catch (e) {}
        }

        function playLevelUpChime() {
            try {
                initAudio();
                const now = audioCtx.currentTime;
                const baseFreq = 220; // A3
                const scaleMultipliers = [1, 1.25, 1.5, 1.875, 2, 2.5, 3]; // Major intervals

                scaleMultipliers.forEach((mult, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();

                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.type = 'triangle';
                    const startTime = now + (index * 0.06);
                    
                    osc.frequency.setValueAtTime(baseFreq * mult, startTime);
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.15, startTime + 0.03);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.8);

                    osc.start(startTime);
                    osc.stop(startTime + 0.8);
                });
            } catch (e) {}
        }

        // --- CORE GAME STATE AND DB ---
        let tasks = {};
        let currentSubject = 'photoshop';
        let isSpinning = false;
        let startAngle = 0;
        let ringAngles = [0, 0, 0];
        let activeSectors = [];
        let tripleSectors = { what: [], style: [], rules: [] };
        let activeCheatCode = null;

        // Visual Customization Themes (Cheat-codes)
        const themes = {
            'photoshop': { main: '#00c6ff', glow: 'rgba(0, 198, 255, 0.15)' },
            'illustrator': { main: '#f7971e', glow: 'rgba(247, 151, 30, 0.15)' },
            'blender': { main: '#ff007f', glow: 'rgba(255, 0, 127, 0.15)' },
            'ai': { main: '#9b5de5', glow: 'rgba(155, 93, 229, 0.15)' },
            'python': { main: '#3776ab', glow: 'rgba(55, 118, 171, 0.15)' },
            'krita': { main: '#00f5d4', glow: 'rgba(0, 245, 212, 0.15)' },
            'aftereffects': { main: '#d62828', glow: 'rgba(214, 40, 40, 0.15)' },
            'figma': { main: '#00bbf9', glow: 'rgba(0, 187, 249, 0.15)' },
            'constructor': { main: '#d4af37', glow: 'rgba(214, 175, 55, 0.15)' },
            'marathon': { main: '#ff0055', glow: 'rgba(255, 0, 85, 0.18)' },
            'GOLD_THEME': { main: '#ffd700', glow: 'rgba(255, 215, 0, 0.25)' },
            'HELL_THEME': { main: '#ff3333', glow: 'rgba(255, 51, 51, 0.3)' },
            'RETRO_THEME': { main: '#ff007f', glow: 'rgba(255, 0, 127, 0.2)' },
            'SPACE_THEME': { main: '#4f46e5', glow: 'rgba(79, 70, 229, 0.2)' }
        };

        let fallbackTasks = {};
        let tasksLoaded = false;

        async function loadTasks() {
            try {
                const response = await fetch('tasks.json');
                if (!response.ok) throw new Error('Не удалось загрузить tasks.json');

                fallbackTasks = await response.json();
                tasksLoaded = true;

                // Удаляем вкладки, для которых нет заданий в tasks.json
                const tabsContainer = document.getElementById('subjectTabs');
                const buttons = tabsContainer.querySelectorAll('.tab-btn');

                buttons.forEach(btn => {
                    const onclickAttr = btn.getAttribute('onclick');
                    const match = onclickAttr && onclickAttr.match(/switchSubject\('([^']+)'/);

                    if (match) {
                        const subject = match[1];

                        if (!fallbackTasks[subject]) {
                            btn.remove();
                        }
                    }
                });

                // Если текущего предмета нет — переключаемся на первый доступный
                if (!fallbackTasks[currentSubject]) {
                    currentSubject = Object.keys(fallbackTasks)[0];

                    const firstButton = document.querySelector('.tab-btn');
                    if (firstButton) {
                        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                        firstButton.classList.add('active');
                    }
                }

                drawWheel();
            } catch (error) {
                console.error('Ошибка загрузки tasks.json:', error);
                alert('Не удалось загрузить tasks.json');
            }
        }

        // --- CONFETTI PARTICLE SYSTEM ---
        const confettiCanvas = document.getElementById('confettiCanvas');
        const cCtx = confettiCanvas.getContext('2d');
        let confettiArray = [];

        function resizeConfettiCanvas() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeConfettiCanvas);
        resizeConfettiCanvas();

        class ConfettiParticle {
            constructor(x, y, levelUp = false) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + (levelUp ? 10 : 4);
                this.speedX = Math.random() * 12 - 6;
                this.speedY = Math.random() * -12 - (levelUp ? 10 : 5);
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 10 - 5;
                this.color = levelUp ? `hsl(${Math.random() * 360}, 100%, 60%)` : this.getThemeColor();
                this.gravity = 0.3;
                this.alpha = 1;
            }

            getThemeColor() {
                const currentAccent = themes[currentSubject]?.main || '#d4af37';
                const colors = [currentAccent, '#ffffff', '#e5e5ea', '#8e8e93'];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.rotation += this.rotationSpeed;
                this.alpha -= 0.015;
            }

            draw() {
                cCtx.save();
                cCtx.translate(this.x, this.y);
                cCtx.rotate((this.rotation * Math.PI) / 180);
                cCtx.fillStyle = this.color;
                cCtx.globalAlpha = this.alpha;
                cCtx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                cCtx.restore();
            }
        }

        function triggerConfetti(levelUp = false) {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2 + 100;
            const count = levelUp ? 200 : 70;
            for (let i = 0; i < count; i++) {
                confettiArray.push(new ConfettiParticle(centerX, centerY, levelUp));
            }
        }

        function animateConfetti() {
            cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            for (let i = confettiArray.length - 1; i >= 0; i--) {
                confettiArray[i].update();
                if (confettiArray[i].alpha <= 0) {
                    confettiArray.splice(i, 1);
                } else {
                    confettiArray[i].draw();
                }
            }
            requestAnimationFrame(animateConfetti);
        }
        animateConfetti();

        // --- MATRIX RAIN SYSTEM ---
        const matrixCanvas = document.getElementById('matrixCanvas');
        const mCtx = matrixCanvas.getContext('2d');
        let matrixInterval = null;

        function resizeMatrixCanvas() {
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeMatrixCanvas);
        resizeMatrixCanvas();

        const katakana = "アァカサタナハマヤャラワガザダバパイィウゥクスツヌフムユュルグズヅブプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン";
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const chars = (katakana + alphabet).split("");
        
        let columns = window.innerWidth / 14;
        let rainDrops = [];

        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        function drawMatrix() {
            mCtx.fillStyle = 'rgba(7, 7, 8, 0.15)';
            mCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            mCtx.fillStyle = '#0F0';
            mCtx.font = '14px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                mCtx.fillText(text, i * 14, rainDrops[i] * 14);

                if (rainDrops[i] * 14 > matrixCanvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        let snowFlakes = [];
        function drawSnow() {
            mCtx.fillStyle = 'rgba(7, 7, 8, 0.25)';
            mCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);
            mCtx.fillStyle = '#ffffff';
            
            if (snowFlakes.length < 100) {
                snowFlakes.push({
                    x: Math.random() * matrixCanvas.width,
                    y: 0,
                    r: Math.random() * 3 + 1,
                    d: Math.random() * 1.5 + 0.5
                });
            }

            for (let i = 0; i < snowFlakes.length; i++) {
                let f = snowFlakes[i];
                mCtx.beginPath();
                mCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);
                mCtx.fill();

                f.y += f.d;
                f.x += Math.sin(f.y / 30) * 0.5;

                if (f.y > matrixCanvas.height) {
                    snowFlakes[i] = {
                        x: Math.random() * matrixCanvas.width,
                        y: 0,
                        r: Math.random() * 3 + 1,
                        d: Math.random() * 1.5 + 0.5
                    };
                }
            }
        }

        let rainbowHue = 0;
        function tickRainbow() {
            if (activeCheatCode !== 'RAINBOW') return;
            rainbowHue = (rainbowHue + 1) % 360;
            document.documentElement.style.setProperty('--accent-color', `hsl(${rainbowHue}, 100%, 60%)`);
            document.documentElement.style.setProperty('--accent-glow', `hsla(${rainbowHue}, 100%, 60%, 0.15)`);
            drawWheel();
            requestAnimationFrame(tickRainbow);
        }

        // --- DB MANAGEMENT & LOADING ---
        async function loadTasks() {
            try {
                const response = await fetch('tasks.json');
                if (response.ok) {
                    tasks = await response.json();
                } else {
                    throw new Error("Local task file fetch blocked/CORS");
                }
            } catch (error) {
                tasks = fallbackTasks;
            }
            prepareWheelSectors();
        }

        function prepareWheelSectors() {
            if (currentSubject === 'constructor') {
                tripleSectors.what = shuffleArray([...(tasks.constructor_what || fallbackTasks.constructor_what)]).slice(0, 8);
                tripleSectors.style = shuffleArray([...(tasks.constructor_style || fallbackTasks.constructor_style)]).slice(0, 8);
                tripleSectors.rules = shuffleArray([...(tasks.constructor_rules || fallbackTasks.constructor_rules)]).slice(0, 8);
            } else if (currentSubject === 'marathon') {
                const standardSubjects = ['photoshop', 'illustrator', 'blender', 'ai', 'python', 'krita', 'aftereffects', 'figma'];
                let allStandardTasks = [];
                standardSubjects.forEach(sub => {
                    const subList = tasks[sub] || fallbackTasks[sub] || [];
                    allStandardTasks = allStandardTasks.concat(subList);
                });
                activeSectors = shuffleArray([...allStandardTasks]).slice(0, 10);
            } else {
                const fullList = tasks[currentSubject] || fallbackTasks[currentSubject] || [];
                activeSectors = fullList.length > 10 ? shuffleArray([...fullList]).slice(0, 10) : [...fullList];
            }
            drawWheel();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getAccentColor(subject) {
            if (activeCheatCode === 'GOLD') return themes['GOLD_THEME'];
            if (activeCheatCode === 'HELL') return themes['HELL_THEME'];
            if (activeCheatCode === 'RETRO') return themes['RETRO_THEME'];
            if (activeCheatCode === 'SPACE') return themes['SPACE_THEME'];
            return themes[subject] || themes['photoshop'];
        }

        function updateAccentStyles(subject) {
            const theme = getAccentColor(subject);
            document.documentElement.style.setProperty('--accent-color', theme.main);
            document.documentElement.style.setProperty('--accent-glow', theme.glow);
        }

        function getSegmentLabel(taskString, index) {
            const match = taskString.match(/«(.*?)»/);
            if (match && match[1]) {
                let name = match[1].toUpperCase();
                return name.length > 15 ? name.substring(0, 13) + '...' : name;
            }
            return `КВЕСТ ${index + 1}`;
        }

        // --- DRAW WHEEL GRAPHICS (CANVAS) ---
        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 15;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (currentSubject === 'constructor') {
                drawConcentricRings(ctx, centerX, centerY, radius);
            } else {
                const numSectors = activeSectors.length;
                if (numSectors === 0) return;
                const arc = 2 * Math.PI / numSectors;

                ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
                ctx.shadowBlur = 15;
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius + 4, 0, 2 * Math.PI);
                ctx.stroke();
                ctx.shadowBlur = 0;

                for (let i = 0; i < numSectors; i++) {
                    const angle = startAngle + i * arc;
                    ctx.fillStyle = (i % 2 === 0) ? '#101012' : '#17171a';
                    
                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, radius, angle, angle + arc);
                    ctx.lineTo(centerX, centerY);
                    ctx.fill();

                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    ctx.save();
                    ctx.fillStyle = (i % 2 === 0) ? '#a1a1a6' : '#8e8e93';
                    ctx.font = '500 8px Montserrat';
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'middle';
                    ctx.translate(centerX, centerY);
                    ctx.rotate(angle + arc / 2);
                    
                    const label = getSegmentLabel(activeSectors[i], i);
                    ctx.fillText(label, radius - 20, 0);
                    ctx.restore();
                }

                ctx.beginPath();
                ctx.arc(centerX, centerY, 30, 0, 2 * Math.PI);
                ctx.fillStyle = '#070708';
                ctx.fill();
                
                const accent = getAccentColor(currentSubject).main;
                ctx.strokeStyle = accent;
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
                ctx.fillStyle = accent;
                ctx.fill();
            }
        }

        function drawConcentricRings(ctx, cx, cy, maxRadius) {
            const rings = [
                { sectors: tripleSectors.what, rIn: 115, rOut: 170, angle: ringAngles[0] },   // Outer Ring
                { sectors: tripleSectors.style, rIn: 65, rOut: 115, angle: ringAngles[1] },  // Middle Ring
                { sectors: tripleSectors.rules, rIn: 25, rOut: 65, angle: ringAngles[2] }    // Inner Ring
            ];

            rings.forEach((ring, rIdx) => {
                const numSectors = ring.sectors.length;
                if (numSectors === 0) return;
                const arc = 2 * Math.PI / numSectors;

                for (let i = 0; i < numSectors; i++) {
                    const angle = ring.angle + i * arc;
                    
                    if (rIdx === 0) {
                        ctx.fillStyle = (i % 2 === 0) ? '#101012' : '#151518';
                    } else if (rIdx === 1) {
                        ctx.fillStyle = (i % 2 === 0) ? '#17171a' : '#1d1d22';
                    } else {
                        ctx.fillStyle = (i % 2 === 0) ? '#1f1f24' : '#25252b';
                    }

                    ctx.beginPath();
                    ctx.arc(cx, cy, ring.rOut, angle, angle + arc);
                    ctx.arc(cx, cy, ring.rIn, angle + arc, angle, true);
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    ctx.save();
                    ctx.fillStyle = (i % 2 === 0) ? '#a1a1a6' : '#8e8e93';
                    ctx.font = rIdx === 2 ? '500 6px Montserrat' : '500 7px Montserrat';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.translate(cx, cy);
                    ctx.rotate(angle + arc / 2);
                    
                    const text = ring.sectors[i];
                    const shortText = text.length > 12 ? text.substring(0, 10) + '..' : text;
                    const textR = (ring.rIn + ring.rOut) / 2;
                    ctx.fillText(shortText.toUpperCase(), textR, 0);
                    ctx.restore();
                }
            });

            ctx.beginPath();
            ctx.arc(cx, cy, 24, 0, 2 * Math.PI);
            ctx.fillStyle = '#070708';
            ctx.fill();
            const accent = getAccentColor('constructor').main;
            ctx.strokeStyle = accent;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(cx, cy, 4, 0, 2 * Math.PI);
            ctx.fillStyle = accent;
            ctx.fill();
        }

        // --- NAVIGATION & TABS ---
        function switchSubject(subject, element) {
            if (isSpinning) return;
            initAudio();
            playSoftClick();

            currentSubject = subject;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            // Autocenter selected tab
            element.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

            updateAccentStyles(subject);

            const placeholder = document.getElementById('placeholder');
            const taskTitle = document.getElementById('taskTitle');
            const taskDisplay = document.getElementById('taskDisplay');
            const copyBtn = document.getElementById('copyBtn');
            const doneBtn = document.getElementById('doneBtn');
            const timerContainer = document.getElementById('timerContainer');
            
            taskTitle.classList.remove('show');
            taskDisplay.classList.remove('show');
            copyBtn.classList.remove('show');
            doneBtn.classList.remove('show');
            timerContainer.classList.remove('show');
            
            setTimeout(() => {
                taskDisplay.style.display = 'none';
                taskTitle.style.display = 'none';
                placeholder.style.display = 'block';
                placeholder.innerText = `КОЛЕСО ГОТОВО ДЛЯ: ${element.innerText.toUpperCase()}`;
                
                startAngle = 0;
                ringAngles = [0, 0, 0];
                prepareWheelSectors();
            }, 300);
        }

        // --- WHEEL SPIN ACTION ---
      function spinWheel() {

    // Каждый запуск — новая случайная подборка
    if (!isMarathonMode) {

        const fullList = fallbackTasks[currentSubject] || [];

        // Перемешиваем ВСЕ задания
        const shuffled = shuffleArray([...fullList]);

        // Берём случайную партию
        const sectorCount = Math.min(10, shuffled.length);

        activeSectors = shuffled.slice(0, sectorCount);

    } else {

        const shuffled = shuffleArray([...allStandardTasks]);

        const sectorCount = Math.min(10, shuffled.length);

        activeSectors = shuffled.slice(0, sectorCount);
    }

               // Обновляем случайный набор заданий перед каждым запуском
    updateWheelData();

    // Перерисовываем колесо
    drawWheel();

    if (isSpinning) return;

    isSpinning = true;

    const extraSpins = 5 + Math.random() * 5;

    const randomSector = Math.floor(Math.random() * activeSectors.length);

    const degreesPerSector = 360 / activeSectors.length;

    const targetAngle =
        (360 * extraSpins) +
        (360 - (randomSector * degreesPerSector) - degreesPerSector / 2);

    currentRotation += targetAngle;

    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {

        const task = activeSectors[randomSector];

        resultText.textContent = task;

        isSpinning = false;

    }, 5000);
}
            if (isSpinning) return;
            initAudio();
            isSpinning = true;
            
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;

            const placeholder = document.getElementById('placeholder');
            const taskTitle = document.getElementById('taskTitle');
            const taskDisplay = document.getElementById('taskDisplay');
            const copyBtn = document.getElementById('copyBtn');
            const doneBtn = document.getElementById('doneBtn');
            const timerContainer = document.getElementById('timerContainer');
            
            placeholder.style.display = 'none';
            taskTitle.style.display = 'none';
            taskDisplay.style.display = 'none';
            taskTitle.classList.remove('show');
            taskDisplay.classList.remove('show');
            copyBtn.classList.remove('show');
            doneBtn.classList.remove('show');
            timerContainer.classList.remove('show');
            resetActiveTimer();

            const spinDuration = 5200; 
            const startTime = performance.now();

            let lastAudioIndex = -1;

            if (currentSubject === 'constructor') {
                const targetRotations = [
                    (5 + Math.random() * 5) * 2 * Math.PI,    
                    -(6 + Math.random() * 4) * 2 * Math.PI,   
                    (7 + Math.random() * 5) * 2 * Math.PI     
                ];
                const initAngles = [...ringAngles];

                function animateTriple(currentTime) {
                    const elapsed = currentTime - startTime;
                    if (elapsed < spinDuration) {
                        const progress = elapsed / spinDuration;
                        const easeOut = 1 - Math.pow(1 - progress, 4.5); 
                        
                        ringAngles[0] = initAngles[0] + targetRotations[0] * easeOut;
                        ringAngles[1] = initAngles[1] + targetRotations[1] * easeOut;
                        ringAngles[2] = initAngles[2] + targetRotations[2] * easeOut;
                        
                        const numSectors = tripleSectors.what.length;
                        const arc = 2 * Math.PI / numSectors;
                        const currIndex = Math.floor(ringAngles[0] / arc);
                        if (currIndex !== lastAudioIndex) {
                            playTickSound();
                            lastAudioIndex = currIndex;
                        }

                        drawWheel();
                        requestAnimationFrame(animateTriple);
                    } else {
                        ringAngles[0] = initAngles[0] + targetRotations[0];
                        ringAngles[1] = initAngles[1] + targetRotations[1];
                        ringAngles[2] = initAngles[2] + targetRotations[2];
                        drawWheel();
                        resolveSpinResults();
                    }
                }
                requestAnimationFrame(animateTriple);

            } else {
                const numSectors = activeSectors.length;
                const spinRotations = 6 + Math.random() * 7;
                const totalTargetRotation = spinRotations * 2 * Math.PI;
                const initialAngle = startAngle;

                function animateSingle(currentTime) {
                    const elapsed = currentTime - startTime;
                    if (elapsed < spinDuration) {
                        const progress = elapsed / spinDuration;
                        const easeOut = 1 - Math.pow(1 - progress, 4); 
                        startAngle = initialAngle + totalTargetRotation * easeOut;
                        
                        const arc = 2 * Math.PI / numSectors;
                        const currIndex = Math.floor(startAngle / arc);
                        if (currIndex !== lastAudioIndex) {
                            playTickSound();
                            lastAudioIndex = currIndex;
                        }

                        drawWheel();
                        requestAnimationFrame(animateSingle);
                    } else {
                        startAngle = initialAngle + totalTargetRotation;
                        drawWheel();
                        resolveSpinResults();
                    }
                }
                requestAnimationFrame(animateSingle);
            }
        }


        // --- RESOLVE SPIN OUTCOME AND DISPLAY ---
        let activeTaskText = '';

        function resolveSpinResults() {
            const btn = document.getElementById('generateBtn');
            const taskTitle = document.getElementById('taskTitle');
            const taskDisplay = document.getElementById('taskDisplay');
            const copyBtn = document.getElementById('copyBtn');
            const doneBtn = document.getElementById('doneBtn');
            const timerContainer = document.getElementById('timerContainer');

            isSpinning = false;
            btn.disabled = false;

            playVictoryChime();
            triggerConfetti();

            taskTitle.style.display = 'block';
            taskDisplay.style.display = 'block';
            timerContainer.classList.add('show');

            if (currentSubject === 'constructor') {
                const resolveIndex = (angle, sectors) => {
                    let normalized = angle % (2 * Math.PI);
                    if (normalized < 0) normalized += 2 * Math.PI;
                    const arc = 2 * Math.PI / sectors.length;
                    let winningIdx = Math.floor((3 * Math.PI / 2 - normalized) / arc) % sectors.length;
                    if (winningIdx < 0) winningIdx += sectors.length;
                    return winningIdx;
                };

                const winWhat = tripleSectors.what[resolveIndex(ringAngles[0], tripleSectors.what)];
                const winStyle = tripleSectors.style[resolveIndex(ringAngles[1], tripleSectors.style)];
                const winRules = tripleSectors.rules[resolveIndex(ringAngles[2], tripleSectors.rules)];

                activeTaskText = `СОЗДАТЬ: ${winWhat} | СТИЛЬ: ${winStyle} | УСЛОВИЕ: ${winRules}`;

                taskDisplay.innerHTML = `
                    <div class="triple-result">
                        <div class="triple-part">
                            <div class="triple-label">ЧТО СОЗДАТЬ</div>
                            <div class="triple-val">${winWhat}</div>
                        </div>
                        <div class="triple-part">
                            <div class="triple-label">СТИЛЬ / ОСОБЕННОСТЬ</div>
                            <div class="triple-val">${winStyle}</div>
                        </div>
                        <div class="triple-part">
                            <div class="triple-label">УСЛОЖНЕНИЕ</div>
                            <div class="triple-val">${winRules}</div>
                        </div>
                    </div>
                `;
            } else {
                const numSectors = activeSectors.length;
                const arc = 2 * Math.PI / numSectors;
                let normalizedAngle = startAngle % (2 * Math.PI);
                if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
                
                let winningIndex = Math.floor((3 * Math.PI / 2 - normalizedAngle) / arc) % numSectors;
                if (winningIndex < 0) winningIndex += numSectors;

                activeTaskText = activeSectors[winningIndex];
                taskDisplay.innerText = activeTaskText;
            }

            // Save to Local Quest Log History
            saveQuestToHistory(currentSubject.toUpperCase(), activeTaskText);

            setTimeout(() => {
                taskTitle.classList.add('show');
                taskDisplay.classList.add('show');
                copyBtn.classList.add('show');
                doneBtn.classList.add('show');
            }, 50);
        }

        // --- QUEST HISTORY LOGGER ---
        function saveQuestToHistory(subjectName, text) {
            let history = JSON.parse(localStorage.getItem('itilandia_history')) || [];
            history.unshift({ subject: subjectName, taskText: text, timestamp: Date.now() });
            
            // Limit to last 20 quests
            if (history.length > 20) history.pop();
            localStorage.setItem('itilandia_history', JSON.stringify(history));
            renderQuestHistory();
        }

        function renderQuestHistory() {
            const container = document.getElementById('questList');
            container.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('itilandia_history')) || [];

            if (history.length === 0) {
                container.innerHTML = `<div class="placeholder-text" style="text-align: center; margin-top: 40px; opacity: 0.5;">Вызовов еще не было</div>`;
                return;
            }

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'quest-item';
                div.innerHTML = `
                    <div class="quest-item-subject">${item.subject}</div>
                    <div>${item.taskText}</div>
                `;
                div.onclick = () => {
                    playSoftClick();
                    copyDirectText(item.taskText);
                };
                container.appendChild(div);
            });
        }

        function toggleDrawer(open) {
            playSoftClick();
            const drawer = document.getElementById('questLogDrawer');
            if (open) {
                drawer.classList.add('open');
                renderQuestHistory();
            } else {
                drawer.classList.remove('open');
            }
        }

        // --- LEVEL & XP STORAGE SYSTEM ---
        let userXP = parseInt(localStorage.getItem('itilandia_xp')) || 0;

        function getLevelInfo(xpVal) {
            if (xpVal < 300) return { level: 1, name: 'Новичок', min: 0, max: 300 };
            if (xpVal < 800) return { level: 2, name: 'Подмастерье', min: 300, max: 800 };
            if (xpVal < 1500) return { level: 3, name: '3D-Владыка', min: 800, max: 1500 };
            return { level: 4, name: 'Пиксельный Бог', min: 1500, max: 1500 }; // Max Level/Infinity Prestige
        }

        function updateXPDisplay() {
            const info = getLevelInfo(userXP);
            const fillPct = info.level === 4 ? 100 : ((userXP - info.min) / (info.max - info.min)) * 100;
            
            document.getElementById('xpBarFill').style.width = `${fillPct}%`;
            document.getElementById('levelName').innerText = `${info.name} (УРОВЕНЬ ${info.level})`;
            document.getElementById('xpDisplayVal').innerText = info.level === 4 ? `${userXP} XP` : `${userXP - info.min} / ${info.max - info.min} XP`;
        }

        function claimXP() {
            initAudio();
            const doneBtn = document.getElementById('doneBtn');
            doneBtn.classList.remove('show'); // Prevent double click

            const oldLevel = getLevelInfo(userXP).level;
            userXP += 100;
            localStorage.setItem('itilandia_xp', userXP);

            playVictoryChime();
            triggerConfetti();

            const newLevel = getLevelInfo(userXP).level;
            if (newLevel > oldLevel) {
                setTimeout(() => {
                    playLevelUpChime();
                    triggerConfetti(true);
                }, 500);
            }
            updateXPDisplay();
        }

        // --- MINIMALIST CHALLENGE TIMER ---
        let countdownActive = false;
        let timerEndTimestamp = 0;
        let totalTimerDuration = 0;
        let timerAnimationId = null;

        function startTimer(minutes) {
            playSoftClick();
            const now = Date.now();
            timerEndTimestamp = now + minutes * 60 * 1000;
            totalTimerDuration = minutes * 60 * 1000;
            countdownActive = true;
            document.getElementById('timerPresets').style.display = 'none';
            tickTimer();
        }

        function tickTimer() {
            if (!countdownActive) return;
            const now = Date.now();
            const remaining = timerEndTimestamp - now;

            if (remaining <= 0) {
                playLevelUpChime();
                triggerConfetti(true);
                resetActiveTimer();
                return;
            }

            const totalSeconds = Math.ceil(remaining / 1000);
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            
            const displayStr = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            const displayEl = document.getElementById('timerDisplay');
            displayEl.innerText = displayStr;

            const percentage = (remaining / totalTimerDuration) * 100;
            document.getElementById('timerProgressFill').style.width = `${percentage}%`;

            // Warnings at final 10 seconds
            if (totalSeconds <= 10) {
                displayEl.classList.add('danger');
                playTimerWarningClick();
            } else {
                displayEl.classList.remove('danger');
            }

            timerAnimationId = setTimeout(tickTimer, 1000);
        }

        function resetActiveTimer() {
            countdownActive = false;
            clearTimeout(timerAnimationId);
            document.getElementById('timerPresets').style.display = 'flex';
            document.getElementById('timerDisplay').innerText = '15:00';
            document.getElementById('timerDisplay').classList.remove('danger');
            document.getElementById('timerProgressFill').style.width = '100%';
        }

        // --- CHEAT CODES INPUT TERMINAL ---
        function handleCheatcode(e) {
            if (e.key === 'Enter') {
                const code = e.target.value.toUpperCase().trim();
                e.target.value = '';
                
                // Clear active states
                if (matrixInterval) clearInterval(matrixInterval);
                document.getElementById('matrixCanvas').style.opacity = '0';
                activeCheatCode = null;
                
                if (code === 'MATRIX') {
                    playLevelUpChime();
                    document.getElementById('matrixCanvas').style.opacity = '1';
                    activeCheatCode = 'MATRIX';
                    matrixInterval = setInterval(drawMatrix, 35);
                    updateAccentStyles(currentSubject);
                } else if (code === 'SNOW') {
                    playLevelUpChime();
                    document.getElementById('matrixCanvas').style.opacity = '1';
                    activeCheatCode = 'SNOW';
                    snowFlakes = [];
                    matrixInterval = setInterval(drawSnow, 25);
                    updateAccentStyles(currentSubject);
                } else if (code === 'RAINBOW') {
                    playLevelUpChime();
                    activeCheatCode = 'RAINBOW';
                    tickRainbow();
                } else if (code === 'RETRO') {
                    playLevelUpChime();
                    activeCheatCode = 'RETRO';
                    updateAccentStyles(currentSubject);
                } else if (code === 'SPACE') {
                    playLevelUpChime();
                    activeCheatCode = 'SPACE';
                    updateAccentStyles(currentSubject);
                } else if (code === 'BOOST') {
                    playLevelUpChime();
                    userXP += 500;
                    localStorage.setItem('itilandia_xp', userXP);
                    triggerConfetti(true);
                    updateXPDisplay();
                } else if (code === 'GOLD') {
                    playLevelUpChime();
                    activeCheatCode = 'GOLD';
                    updateAccentStyles(currentSubject);
                } else if (code === 'HELL') {
                    playLevelUpChime();
                    activeCheatCode = 'HELL';
                    updateAccentStyles(currentSubject);
                } else if (code === 'RESET') {
                    playSoftClick();
                    userXP = 0;
                    localStorage.setItem('itilandia_xp', 0);
                    localStorage.removeItem('itilandia_history');
                    updateXPDisplay();
                    updateAccentStyles(currentSubject);
                } else {
                    playSoftClick();
                    updateAccentStyles(currentSubject);
                }
                drawWheel();
            }
        }

        // --- CLIPBOARD ACTIONS ---
        function copyTaskToClipboard() {
            playSoftClick();
            copyDirectText(activeTaskText);
        }

        function copyDirectText(textVal) {
            const btnText = document.getElementById('copyBtnText');
            const textarea = document.createElement('textarea');
            textarea.value = `Челлендж от Айтиландии:\n\n${textVal}`;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                if (btnText) {
                    btnText.innerText = "СКОПИРОВАНО!";
                    btnText.style.color = "var(--accent-color)";
                }
            } catch (err) {
                if (btnText) btnText.innerText = "ОШИБКА";
            }
            
            document.body.removeChild(textarea);

            setTimeout(() => {
                if (btnText) {
                    btnText.innerText = "Скопировать";
                    btnText.style.color = "";
                }
            }, 2000);
        }

        // --- WINDOW INITIALIZERS ---
        window.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            updateXPDisplay();
            updateAccentStyles('photoshop'); 
            
            const subjectTabs = document.getElementById('subjectTabs');
            if (subjectTabs) {
                // Wheel hover scrolling
                subjectTabs.addEventListener('wheel', (e) => {
                    if (e.deltaY !== 0) {
                        e.preventDefault();
                        subjectTabs.scrollLeft += e.deltaY * 1.5;
                    }
                });

                // Horizontal drag-to-scroll
                let isDown = false;
                let startX;
                let scrollLeft;

                subjectTabs.addEventListener('mousedown', (e) => {
                    isDown = true;
                    startX = e.pageX - subjectTabs.offsetLeft;
                    scrollLeft = subjectTabs.scrollLeft;
                });

                subjectTabs.addEventListener('mouseleave', () => { isDown = false; });
                subjectTabs.addEventListener('mouseup', () => { isDown = false; });

                subjectTabs.addEventListener('mousemove', (e) => {
                    if (!isDown) return;
                    e.preventDefault();
                    const x = e.pageX - subjectTabs.offsetLeft;
                    const walk = (x - startX) * 1.5; 
                    subjectTabs.scrollLeft = scrollLeft - walk;
                });
            }

            // Unlock audio node on gesture
            const warmAudio = () => {
                initAudio();
                window.removeEventListener('click', warmAudio);
                window.removeEventListener('touchstart', warmAudio);
            };
            window.addEventListener('click', warmAudio);
            window.addEventListener('touchstart', warmAudio);
        });
    </script>
