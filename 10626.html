<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ITILANDIA // CREATIVE WHEEL 4.2 PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent-color: #d4af37;
            --accent-glow: rgba(214, 175, 55, 0.15);
            --bg-color: #070708;
            --font-primary: 'Montserrat', sans-serif;
            --font-accent: 'Playfair Display', serif;
            --card-bg: linear-gradient(180deg, rgba(255,255,255,0.01) 0%, rgba(255,255,255,0) 100%);
            --border-color: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-color);
            color: #f5f5f7;
            font-family: var(--font-primary);
            letter-spacing: 0.05em;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.4s ease;
            position: relative;
        }

        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 20%, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            pointer-events: none;
            z-index: 0;
            transition: background 0.5s ease;
        }

        canvas#confettiCanvas,
        canvas#matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }
        canvas#matrixCanvas {
            z-index: 1;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        header {
            padding: 25px 20px 10px;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .xp-badge-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .xp-bar-container {
            width: 220px;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.03);
            overflow: hidden;
        }
        .xp-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-color), #ffffff);
            border-radius: 4px;
            transition: width 0.4s ease;
        }
        .level-text {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--accent-color);
        }
        .brand-sub {
            font-size: 10px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--accent-color);
            margin-bottom: 8px;
            font-weight: 700;
        }
        h1 {
            font-family: var(--font-accent);
            font-size: 2.2rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0.02em;
            color: white;
        }
        h1 span {
            font-family: var(--font-primary);
            font-style: normal;
            font-weight: 300;
            font-size: 1.4rem;
            color: #a1a1a6;
            display: block;
            letter-spacing: 0.12em;
            margin-top: 5px;
        }

        main {
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tabs-wrapper {
            width: 100%;
            max-width: 950px;
            margin-bottom: 25px;
            position: relative;
            padding: 0 30px;
        }
        .tabs {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding-bottom: 12px;
            cursor: grab;
            user-select: none;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tabs:active { cursor: grabbing; }

        .tab-btn {
            background: none;
            border: none;
            color: #6e6e73;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 8px 18px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            position: relative;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-color);
            transform: scaleX(0);
            transition: transform 0.3s;
        }
        .tab-btn.active { color: white; }
        .tab-btn.active::after { transform: scaleX(1); }
        .tab-btn.special-tab, .tab-btn.marathon-tab {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 6px 16px;
        }
        .tab-btn.special-tab.active, .tab-btn.marathon-tab.active {
            background: rgba(255,255,255,0.05);
            border-color: var(--accent-color);
        }
        .tab-btn.special-tab::after, .tab-btn.marathon-tab::after { display: none; }

        .playzone {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .wheel-wrapper {
            position: relative;
            width: 380px;
            height: 380px;
            flex-shrink: 0;
        }
        .wheel-pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 26px;
            height: 26px;
            z-index: 15;
            filter: drop-shadow(0 0 6px var(--accent-color));
        }
        .wheel-pointer svg { fill: var(--accent-color); width: 100%; height: 100%; }
        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
            background: #09090a;
        }
        .display-container {
            flex: 1;
            min-width: 260px;
            max-width: 480px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px 25px;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        .placeholder-text {
            font-size: 11px;
            color: #6e6e73;
            letter-spacing: 0.15em;
            font-weight: 500;
        }
        .task-title {
            font-size: 10px;
            color: var(--accent-color);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.4s;
        }
        .task-text {
            font-size: 15px;
            line-height: 1.55;
            font-weight: 300;
            color: white;
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin-bottom: 18px;
        }
        .task-text.show, .task-title.show { opacity: 1; transform: translateY(0); }

        .triple-result { text-align: left; display: flex; flex-direction: column; gap: 14px; }
        .triple-part { border-left: 2px solid var(--accent-color); padding-left: 15px; }
        .triple-label { font-size: 9px; letter-spacing: 0.2em; color: var(--accent-color); margin-bottom: 4px; }
        .triple-val { font-size: 13px; font-weight: 300; }

        .action-row { display: flex; gap: 12px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .copy-btn, .done-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            color: #a1a1a6;
            padding: 7px 16px;
            font-size: 9px;
            letter-spacing: 0.15em;
            border-radius: 40px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }
        .done-btn { border-color: var(--accent-color); color: var(--accent-color); }
        .copy-btn.show, .done-btn.show { opacity: 1; transform: scale(1); pointer-events: auto; }
        .copy-btn:hover, .done-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--accent-color); color: white; }

        .timer-container {
            margin-top: 18px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: 0.3s;
        }
        .timer-container.show { display: flex; opacity: 1; }
        .timer-presets { display: flex; gap: 10px; }
        .timer-preset-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.1);
            color: #a1a1a6;
            font-size: 9px;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .timer-display {
            font-size: 28px;
            font-weight: 300;
            font-family: monospace;
            letter-spacing: 0.08em;
        }
        .timer-display.danger { color: #ff3b30; text-shadow: 0 0 6px #ff3b30; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } }
        .timer-progress { width: 80%; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 5px; }
        .timer-progress-fill { width: 100%; height: 100%; background: var(--accent-color); transition: width 1s linear; }

        .trigger-btn {
            background: white;
            color: black;
            border: none;
            padding: 14px 42px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3em;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 25px;
            border-radius: 40px;
        }
        .trigger-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; background: #2c2c2e; color: gray; }

        .drawer-trigger {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(7,7,8,0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 200;
            transition: 0.2s;
        }
        .drawer-trigger:hover { border-color: var(--accent-color); transform: scale(1.05); }
        .quest-log-drawer {
            position: fixed;
            top: 0;
            right: -340px;
            width: 320px;
            height: 100%;
            background: rgba(7,7,8,0.96);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.05);
            z-index: 1000;
            transition: right 0.4s ease;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }
        .quest-log-drawer.open { right: 0; }
        .drawer-header { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .drawer-title { color: var(--accent-color); font-size: 10px; letter-spacing: 0.2em; }
        .drawer-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .quest-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .quest-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            padding: 12px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .quest-item:hover { background: rgba(255,255,255,0.05); border-color: var(--accent-color); }
        .quest-item-subject { font-size: 8px; letter-spacing: 0.1em; color: var(--accent-color); margin-bottom: 6px; }

        footer {
            padding: 18px;
            text-align: center;
            font-size: 8px;
            letter-spacing: 0.2em;
            color: #3a3a3c;
            border-top: 1px solid rgba(255,255,255,0.02);
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .terminal-input {
            background: none;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            width: 110px;
            font-size: 9px;
            color: white;
            text-align: center;
            outline: none;
        }
        @media (max-width: 800px) {
            .wheel-wrapper { width: 280px; height: 280px; }
            .tab-btn { padding: 5px 12px; font-size: 8px; }
        }
    </style>
</head>
<body>

<div class="ambient-glow" id="ambientGlow"></div>
<canvas id="matrixCanvas"></canvas>
<canvas id="confettiCanvas"></canvas>

<header>
    <div class="xp-badge-container">
        <div class="level-text" id="levelName">НОВИЧОК (УРОВЕНЬ 1)</div>
        <div class="xp-bar-container"><div class="xp-bar-fill" id="xpBarFill"></div></div>
        <div class="level-text" id="xpDisplayVal">0 / 300 XP</div>
    </div>
    <div class="brand-sub">АЙТИЛАНДИЯ // ACADEMY OF FUTURE CREATIVES</div>
    <h1>Айтиландия <span>CREATIVE WHEEL v4.2 PRO</span></h1>
</header>

<main>
    <div class="tabs-wrapper">
        <div class="tabs" id="subjectTabs">
            <button class="tab-btn active" data-subj="photoshop">Photoshop</button>
            <button class="tab-btn" data-subj="illustrator">Illustrator</button>
            <button class="tab-btn" data-subj="blender">Blender</button>
            <button class="tab-btn" data-subj="ai">ИИ Промптинг</button>
            <button class="tab-btn" data-subj="python">Python Art</button>
            <button class="tab-btn" data-subj="krita">Krita Рисование</button>
            <button class="tab-btn" data-subj="aftereffects">After Effects</button>
            <button class="tab-btn" data-subj="figma">Figma UX</button>
            <button class="tab-btn special-tab" data-subj="constructor">⚡ Конструктор</button>
            <button class="tab-btn marathon-tab" data-subj="marathon">🏃 Марафон</button>
        </div>
    </div>

    <div class="playzone">
        <div class="wheel-wrapper">
            <div class="wheel-pointer"><svg viewBox="0 0 24 24"><path d="M12 21l-8.2-13h16.4z"/></svg></div>
            <canvas id="wheelCanvas" width="380" height="380"></canvas>
        </div>
        <div class="display-container">
            <div id="placeholder" class="placeholder-text">Крути колесо и получай челлендж!</div>
            <div id="taskTitle" class="task-title">СУПЕР-ЧЕЛЛЕНДЖ</div>
            <div id="taskDisplay" class="task-text"></div>
            <div class="action-row">
                <button id="copyBtn" class="copy-btn"><span>📋 Скопировать</span></button>
                <button id="doneBtn" class="done-btn">✅ Выполнено! (+100 XP)</button>
            </div>
            <div class="timer-container" id="timerContainer">
                <div class="timer-presets"><button class="timer-preset-btn" data-min="15">15 мин</button><button class="timer-preset-btn" data-min="30">30 мин</button><button class="timer-preset-btn" data-min="45">45 мин</button></div>
                <div class="timer-display" id="timerDisplay">15:00</div>
                <div class="timer-progress"><div class="timer-progress-fill" id="timerProgressFill"></div></div>
            </div>
        </div>
    </div>
    <button id="generateBtn" class="trigger-btn">КРУТИТЬ КОЛЕСО</button>
</main>

<div class="drawer-trigger" id="drawerTrigger">📜</div>
<div class="quest-log-drawer" id="questLogDrawer">
    <div class="drawer-header"><div class="drawer-title">ИСТОРИЯ ВЫЗОВОВ</div><button class="drawer-close" id="closeDrawer">✕</button></div>
    <div class="quest-list" id="questList"></div>
</div>

<footer><span>🔐 TERMINAL:</span><input type="text" class="terminal-input" id="terminalInput" placeholder="КОД..."><span>v4.2 PRO</span></footer>

<script>
    // --------------------------------------------------------------
    // 1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
    // --------------------------------------------------------------
    let tasksDB = {};          // полная база из JSON
    let currentSubject = 'photoshop';
    let isSpinning = false;
    let startAngle = 0;
    let ringAngles = [0, 0, 0];
    let wheelSectors = [];     // только для отображения на колесе (8 случайных)
    let tripleSectors = { what: [], style: [], rules: [] };
    let activeTaskText = '';
    let userXP = parseInt(localStorage.getItem('itilandia_xp')) || 0;
    let countdownActive = false, timerInterval = null;
    let audioCtx = null;

    // --------------------------------------------------------------
    // 2. ЗАГРУЗКА tasks.json
    // --------------------------------------------------------------
    async function loadTasks() {
        try {
            const response = await fetch('tasks.json');
            if (!response.ok) throw new Error('HTTP error');
            tasksDB = await response.json();
            console.log('✅ Задания загружены из tasks.json');
        } catch (e) {
            console.warn('⚠️ Не удалось загрузить tasks.json, использую встроенный fallback (часть заданий)');
            // Минимальный fallback на случай отсутствия файла
            tasksDB = {
                photoshop: ["«Городской великан»: Вставь фото человека между небоскребами", "«Киберпанк-бабушка»: Добавь неоновые очки и тату"],
                illustrator: ["«Эмодзи-ты»: Векторный аватар", "«Геометрический монстр»: Из фигур"],
                blender: ["«Меч Джедая»: Low-poly клинок", "«Тропик-Микро»: Остров в воздухе"],
                ai: ["«Город в лампочке»: Промпт", "«Кибер-Самурай»: Кот-самурай"],
                python: ["«Черепаший фрактал»: Цветная спираль", "«Арт-хаус холст»: Случайные круги"],
                krita: ["«Монстр из тени»: Лесной дух", "«Акварельный рассвет»: Горы"],
                aftereffects: ["«Жидкое Золото»: Анимация текста", "«Неоновый след»: Светящийся след"],
                figma: ["«Билет на Марс»: Экран покупки", "«Карта Сокровищ»: Прототип карты"],
                constructor_what: ["Космический корабль", "Затерянный замок"],
                constructor_style: ["в стиле ретро-футуризм", "с неоновым свечением"],
                constructor_rules: ["ровно за 15 минут", "используя 3 базовых цвета"]
            };
        }
        // После загрузки инициализируем всё
        prepareWheelForSubject();
    }

    // --------------------------------------------------------------
    // 3. ПОДГОТОВКА КОЛЕСА (случайные 8 элементов для отображения)
    // --------------------------------------------------------------
    function getRandomSubset(arr, size = 8) {
        if (!arr || !arr.length) return [];
        const shuffled = [...arr];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, size);
    }

    function prepareWheelForSubject() {
        if (currentSubject === 'constructor') {
            // Для конструктора берём случайные подмножества из полных списков
            tripleSectors.what = getRandomSubset(tasksDB.constructor_what || [], 10);
            tripleSectors.style = getRandomSubset(tasksDB.constructor_style || [], 10);
            tripleSectors.rules = getRandomSubset(tasksDB.constructor_rules || [], 10);
        } else if (currentSubject === 'marathon') {
            // Марафон: объединяем все обычные предметы
            const allTasks = [
                ...(tasksDB.photoshop || []), ...(tasksDB.illustrator || []),
                ...(tasksDB.blender || []), ...(tasksDB.ai || []),
                ...(tasksDB.python || []), ...(tasksDB.krita || []),
                ...(tasksDB.aftereffects || []), ...(tasksDB.figma || [])
            ];
            wheelSectors = getRandomSubset(allTasks, 8);
        } else {
            // Обычный предмет
            const fullList = tasksDB[currentSubject] || [];
            wheelSectors = getRandomSubset(fullList, 8);
        }
        drawWheel();
    }

    // --------------------------------------------------------------
    // 4. ОТРИСОВКА КОЛЕСА (только декоративная)
    // --------------------------------------------------------------
    function drawWheel() {
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        const center = w/2, radius = w/2 - 18;
        ctx.clearRect(0, 0, w, h);
        
        if (currentSubject === 'constructor') {
            drawConcentricRings(ctx, center, radius);
        } else {
            const sectors = wheelSectors;
            if (!sectors.length) return;
            const angleStep = (Math.PI * 2) / sectors.length;
            for (let i=0; i<sectors.length; i++) {
                const angle = startAngle + i * angleStep;
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, angle, angle + angleStep);
                ctx.fillStyle = (i % 2 === 0) ? '#101012' : '#18181c';
                ctx.fill();
                ctx.strokeStyle = '#2a2a2e';
                ctx.stroke();
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(angle + angleStep/2);
                ctx.fillStyle = '#a1a1a6';
                ctx.font = 'bold 9px "Montserrat"';
                ctx.textAlign = 'center';
                let label = sectors[i].substring(0, 20);
                ctx.fillText(label, radius - 22, 4);
                ctx.restore();
            }
            ctx.beginPath();
            ctx.arc(center, center, 28, 0, Math.PI*2);
            ctx.fillStyle = '#070708';
            ctx.fill();
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim();
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
    }

    function drawConcentricRings(ctx, center, maxR) {
        const rings = [
            { sectors: tripleSectors.what, rIn: 115, rOut: 170, angle: ringAngles[0] },
            { sectors: tripleSectors.style, rIn: 65, rOut: 115, angle: ringAngles[1] },
            { sectors: tripleSectors.rules, rIn: 25, rOut: 65, angle: ringAngles[2] }
        ];
        rings.forEach((ring, idx) => {
            const len = ring.sectors.length;
            if (!len) return;
            const step = (Math.PI*2)/len;
            for (let i=0; i<len; i++) {
                const a = ring.angle + i*step;
                ctx.beginPath();
                ctx.arc(center, center, ring.rOut, a, a+step);
                ctx.arc(center, center, ring.rIn, a+step, a, true);
                ctx.fillStyle = idx===0 ? '#141416' : (idx===1 ? '#1c1c20' : '#24242a');
                ctx.fill();
                ctx.strokeStyle = '#2f2f35';
                ctx.stroke();
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(a + step/2);
                ctx.fillStyle = '#b0b0b8';
                ctx.font = 'bold 7px "Montserrat"';
                ctx.textAlign = 'center';
                let text = ring.sectors[i].length > 16 ? ring.sectors[i].slice(0,14)+'..' : ring.sectors[i];
                ctx.fillText(text, (ring.rIn+ring.rOut)/2, 4);
                ctx.restore();
            }
        });
        ctx.beginPath();
        ctx.arc(center, center, 24, 0, Math.PI*2);
        ctx.fillStyle = '#070708';
        ctx.fill();
    }

    // --------------------------------------------------------------
    // 5. СЛУЧАЙНЫЙ ВЫБОР ЗАДАНИЯ ИЗ ПОЛНОГО МАССИВА
    // --------------------------------------------------------------
    function getRandomTask() {
        if (currentSubject === 'constructor') {
            const whatArr = tasksDB.constructor_what || [];
            const styleArr = tasksDB.constructor_style || [];
            const rulesArr = tasksDB.constructor_rules || [];
            const randomWhat = whatArr[Math.floor(Math.random() * whatArr.length)];
            const randomStyle = styleArr[Math.floor(Math.random() * styleArr.length)];
            const randomRule = rulesArr[Math.floor(Math.random() * rulesArr.length)];
            return { type: 'constructor', what: randomWhat, style: randomStyle, rule: randomRule };
        } 
        else if (currentSubject === 'marathon') {
            const allTasks = [
                ...(tasksDB.photoshop || []), ...(tasksDB.illustrator || []),
                ...(tasksDB.blender || []), ...(tasksDB.ai || []),
                ...(tasksDB.python || []), ...(tasksDB.krita || []),
                ...(tasksDB.aftereffects || []), ...(tasksDB.figma || [])
            ];
            if (!allTasks.length) return { type: 'text', text: "Нет заданий для марафона" };
            return { type: 'text', text: allTasks[Math.floor(Math.random() * allTasks.length)] };
        }
        else {
            const fullList = tasksDB[currentSubject] || [];
            if (!fullList.length) return { type: 'text', text: "Нет заданий для этого раздела" };
            return { type: 'text', text: fullList[Math.floor(Math.random() * fullList.length)] };
        }
    }

    // --------------------------------------------------------------
    // 6. ВРАЩЕНИЕ (анимация + результат)
    // --------------------------------------------------------------
    function spinWheel() {
        if (isSpinning) return;
        initAudio();
        isSpinning = true;
        document.getElementById('generateBtn').disabled = true;
        document.getElementById('taskTitle').classList.remove('show');
        document.getElementById('taskDisplay').classList.remove('show');
        document.getElementById('copyBtn').classList.remove('show');
        document.getElementById('doneBtn').classList.remove('show');
        document.getElementById('timerContainer').classList.remove('show');
        if (countdownActive) resetTimer();

        const duration = 4000;
        const startTime = performance.now();

        if (currentSubject === 'constructor') {
            // Анимация для конструктора (вращение трёх колец)
            const target = [ (6+Math.random()*5)*Math.PI*2, -(5+Math.random()*5)*Math.PI*2, (7+Math.random()*4)*Math.PI*2 ];
            const init = [...ringAngles];
            function animate(now) {
                const elapsed = now - startTime;
                if (elapsed < duration) {
                    const t = elapsed/duration;
                    const ease = 1 - Math.pow(1-t, 3.5);
                    ringAngles[0] = init[0] + target[0] * ease;
                    ringAngles[1] = init[1] + target[1] * ease;
                    ringAngles[2] = init[2] + target[2] * ease;
                    drawWheel();
                    requestAnimationFrame(animate);
                } else {
                    ringAngles[0] = init[0] + target[0];
                    ringAngles[1] = init[1] + target[1];
                    ringAngles[2] = init[2] + target[2];
                    drawWheel();
                    showRandomResult(); // показываем случайный результат
                }
            }
            requestAnimationFrame(animate);
        } else {
            // Анимация для обычного колеса
            const rotations = 8 + Math.random() * 6;
            const targetAngle = startAngle + rotations * 2 * Math.PI;
            const initAngle = startAngle;
            function animate(now) {
                const elapsed = now - startTime;
                if (elapsed < duration) {
                    const t = elapsed/duration;
                    const ease = 1 - Math.pow(1-t, 3.2);
                    startAngle = initAngle + (targetAngle - initAngle) * ease;
                    drawWheel();
                    requestAnimationFrame(animate);
                } else {
                    startAngle = targetAngle;
                    drawWheel();
                    showRandomResult();
                }
            }
            requestAnimationFrame(animate);
        }
    }

    function showRandomResult() {
        const task = getRandomTask();
        let displayHtml = '';
        let plainText = '';

        if (task.type === 'constructor') {
            plainText = `СОЗДАТЬ: ${task.what} | СТИЛЬ: ${task.style} | УСЛОВИЕ: ${task.rule}`;
            displayHtml = `
                <div class="triple-result">
                    <div class="triple-part"><div class="triple-label">ЧТО СОЗДАТЬ</div><div class="triple-val">${task.what}</div></div>
                    <div class="triple-part"><div class="triple-label">СТИЛЬ / ОСОБЕННОСТЬ</div><div class="triple-val">${task.style}</div></div>
                    <div class="triple-part"><div class="triple-label">УСЛОЖНЕНИЕ</div><div class="triple-val">${task.rule}</div></div>
                </div>
            `;
            document.getElementById('taskDisplay').innerHTML = displayHtml;
        } else {
            plainText = task.text;
            document.getElementById('taskDisplay').innerHTML = plainText;
        }

        activeTaskText = plainText;
        const titleDiv = document.getElementById('taskTitle');
        const textDiv = document.getElementById('taskDisplay');
        titleDiv.classList.add('show');
        textDiv.classList.add('show');
        document.getElementById('copyBtn').classList.add('show');
        document.getElementById('doneBtn').classList.add('show');
        document.getElementById('timerContainer').classList.add('show');
        
        isSpinning = false;
        document.getElementById('generateBtn').disabled = false;
        playVictory();
        saveToHistory(currentSubject.toUpperCase(), plainText);
    }

    // --------------------------------------------------------------
    // 7. ЗВУКИ (короткие)
    // --------------------------------------------------------------
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playVictory() {
        if (!audioCtx) return;
        const notes = [523.25, 659.25, 784.0];
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            const t = audioCtx.currentTime + i * 0.12;
            osc.frequency.setValueAtTime(freq, t);
            gain.gain.setValueAtTime(0.12, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
            osc.start(t); osc.stop(t + 0.6);
        });
    }
    function playSoftClick() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // --------------------------------------------------------------
    // 8. XP, ИСТОРИЯ, ТАЙМЕР
    // --------------------------------------------------------------
    function updateXPBar() {
        let xp = userXP;
        let level = 1, minXp = 0, maxXp = 300;
        if (xp >= 1500) { level = 4; minXp = 1500; maxXp = 1500; }
        else if (xp >= 800) { level = 3; minXp = 800; maxXp = 1500; }
        else if (xp >= 300) { level = 2; minXp = 300; maxXp = 800; }
        let percent = level === 4 ? 100 : ((xp - minXp) / (maxXp - minXp)) * 100;
        document.getElementById('xpBarFill').style.width = `${percent}%`;
        const levelNames = ['', 'Новичок', 'Подмастерье', '3D-Владыка', 'Пиксельный Бог'];
        document.getElementById('levelName').innerText = `${levelNames[level]} (УРОВЕНЬ ${level})`;
        document.getElementById('xpDisplayVal').innerText = level === 4 ? `${xp} XP` : `${xp - minXp} / ${maxXp - minXp} XP`;
    }

    function claimXP() {
        initAudio();
        if (isSpinning) return;
        userXP += 100;
        localStorage.setItem('itilandia_xp', userXP);
        updateXPBar();
        playVictory();
        triggerConfetti();
        document.getElementById('doneBtn').classList.remove('show');
    }

    function saveToHistory(subject, task) {
        let hist = JSON.parse(localStorage.getItem('itilandia_history')) || [];
        hist.unshift({ subject, task, time: Date.now() });
        if (hist.length > 20) hist.pop();
        localStorage.setItem('itilandia_history', JSON.stringify(hist));
        renderHistory();
    }

    function renderHistory() {
        const container = document.getElementById('questList');
        const hist = JSON.parse(localStorage.getItem('itilandia_history')) || [];
        if (!hist.length) { container.innerHTML = '<div class="placeholder-text">Нет вызовов</div>'; return; }
        container.innerHTML = hist.map(h => `<div class="quest-item"><div class="quest-item-subject">${h.subject}</div><div>${h.task}</div></div>`).join('');
        document.querySelectorAll('.quest-item').forEach(el => {
            el.addEventListener('click', () => copyToClipboard(el.innerText));
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        const btnSpan = document.querySelector('#copyBtn span');
        const original = btnSpan.innerText;
        btnSpan.innerText = '✅';
        setTimeout(() => { btnSpan.innerText = original; }, 1500);
    }

    function startTimer(minutes) {
        if (countdownActive) resetTimer();
        let remaining = minutes * 60;
        const display = document.getElementById('timerDisplay');
        const fill = document.getElementById('timerProgressFill');
        const total = remaining;
        countdownActive = true;
        const interval = setInterval(() => {
            if (!countdownActive) { clearInterval(interval); return; }
            if (remaining <= 0) {
                clearInterval(interval);
                playVictory();
                triggerConfetti(true);
                resetTimer();
                return;
            }
            remaining--;
            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            display.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            fill.style.width = `${(remaining/total)*100}%`;
            if (remaining <= 10) display.classList.add('danger');
            else display.classList.remove('danger');
        }, 1000);
        timerInterval = interval;
    }
    function resetTimer() {
        countdownActive = false;
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById('timerDisplay').innerText = '15:00';
        document.getElementById('timerProgressFill').style.width = '100%';
        document.getElementById('timerDisplay').classList.remove('danger');
    }

    function triggerConfetti(heavy=false) {
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];
        for (let i=0;i<80+(heavy?100:0);i++) {
            particles.push({
                x: Math.random()*canvas.width, y: -20,
                size: Math.random()*6+2,
                speedY: Math.random()*8+5,
                speedX: (Math.random()-0.5)*5,
                color: `hsl(${Math.random()*360}, 80%, 60%)`
            });
        }
        function animateConfetti() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let anyAlive = false;
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.y < canvas.height+50) anyAlive = true;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            particles = particles.filter(p => p.y < canvas.height+50);
            if (anyAlive) requestAnimationFrame(animateConfetti);
        }
        animateConfetti();
    }

    // --------------------------------------------------------------
    // 9. ПЕРЕКЛЮЧЕНИЕ ТЕМ И СТИЛИ
    // --------------------------------------------------------------
    function switchSubject(subj, btnElement) {
        if (isSpinning) return;
        playSoftClick();
        currentSubject = subj;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        const accentMap = {
            photoshop:'#00c6ff', illustrator:'#f7971e', blender:'#ff007f', ai:'#9b5de5',
            python:'#3776ab', krita:'#00f5d4', aftereffects:'#d62828', figma:'#00bbf9',
            constructor:'#d4af37', marathon:'#ff0055'
        };
        document.documentElement.style.setProperty('--accent-color', accentMap[subj] || '#d4af37');
        startAngle = 0; ringAngles = [0,0,0];
        prepareWheelForSubject();
        document.getElementById('placeholder').style.display = 'block';
        document.getElementById('taskTitle').classList.remove('show');
        document.getElementById('taskDisplay').classList.remove('show');
        document.getElementById('copyBtn').classList.remove('show');
        document.getElementById('doneBtn').classList.remove('show');
        document.getElementById('timerContainer').classList.remove('show');
        document.getElementById('placeholder').innerText = `КОЛЕСО: ${btnElement.innerText.toUpperCase()}`;
    }

    // --------------------------------------------------------------
    // 10. CHEAT-коды
    // --------------------------------------------------------------
    function handleCheat(e) {
        if (e.key !== 'Enter') return;
        const code = e.target.value.toUpperCase().trim();
        e.target.value = '';
        if (code === 'BOOST') { userXP += 500; localStorage.setItem('itilandia_xp',userXP); updateXPBar(); triggerConfetti(true); }
        if (code === 'RESET') { userXP = 0; localStorage.setItem('itilandia_xp',0); localStorage.removeItem('itilandia_history'); updateXPBar(); renderHistory(); }
        if (code === 'GOLD') document.documentElement.style.setProperty('--accent-color', '#ffd700');
        if (code === 'MATRIX') {
            const mCanvas = document.getElementById('matrixCanvas');
            mCanvas.style.opacity = '0.35';
            let drops = [];
            function matrixRain() {
                if (!mCanvas.style.opacity || mCanvas.style.opacity === '0') return;
                const ctx = mCanvas.getContext('2d');
                mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
                ctx.fillStyle = 'rgba(7,7,8,0.1)';
                ctx.fillRect(0,0,mCanvas.width,mCanvas.height);
                ctx.fillStyle = '#0f0';
                ctx.font = '12px monospace';
                if (drops.length === 0) for (let i=0;i<100;i++) drops[i]=1;
                for (let i=0;i<drops.length;i++) {
                    ctx.fillText(String.fromCharCode(0x30A0+Math.random()*100), i*14, drops[i]*14);
                    if (drops[i]*14 > mCanvas.height && Math.random()>0.975) drops[i]=0;
                    drops[i]++;
                }
                requestAnimationFrame(matrixRain);
            }
            matrixRain();
        }
    }

    // --------------------------------------------------------------
    // 11. ИНИЦИАЛИЗАЦИЯ
    // --------------------------------------------------------------
    window.addEventListener('DOMContentLoaded', async () => {
        await loadTasks();          // загружаем JSON
        updateXPBar();
        renderHistory();
        prepareWheelForSubject();

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => switchSubject(btn.dataset.subj, btn));
        });
        document.getElementById('generateBtn').addEventListener('click', spinWheel);
        document.getElementById('copyBtn').addEventListener('click', () => copyToClipboard(activeTaskText));
        document.getElementById('doneBtn').addEventListener('click', claimXP);
        document.querySelectorAll('.timer-preset-btn').forEach(btn => {
            btn.addEventListener('click', () => startTimer(parseInt(btn.dataset.min)));
        });
        document.getElementById('drawerTrigger').addEventListener('click', () => {
            document.getElementById('questLogDrawer').classList.add('open');
            renderHistory();
        });
        document.getElementById('closeDrawer').addEventListener('click', () => {
            document.getElementById('questLogDrawer').classList.remove('open');
        });
        document.getElementById('terminalInput').addEventListener('keypress', handleCheat);
        document.body.addEventListener('click', () => initAudio(), { once: true });
    });
</script>
